# yaml-language-server: $schema=./schedule.schema.json

# --------------------------------------------
# General Transit Feed Specification Reference
# --------------------------------------------

metadata:
  name: General Transit Feed Specification Reference
  revision_date: '2025-10-28'
  revision_history_url: 'https://gtfs.org/schedule/process/#revision-history'
  description: 'This document defines the format and structure of the files that comprise a GTFS dataset.'

document_conventions:
  description: 'The key words "MUST", "MUST NOT", "REQUIRED", "SHALL", "SHALL NOT", "SHOULD", "SHOULD NOT", "RECOMMENDED", "MAY", and "OPTIONAL" in this document are to be interpreted as described in RFC 2119.'

  term_definitions:
    description: 'This section defines terms that are used throughout this document.'
    terms: 
      - term: 'Dataset'
        definition: 'A complete set of files defined by this specification reference. Altering the dataset creates a new version of the dataset. Datasets should be published at a public, permanent URL, including the zip file name. (e.g., https://www.agency.org/gtfs/gtfs.zip).'
      - term: 'Record'
        definition: 'A basic data structure comprised of a number of different field values describing a single entity (e.g. transit agency, stop, route, etc.). Represented, in a table, as a row.'
      - term: 'Field'
        definition: 'A property of an object or entity. Represented, in a table, as a column. The field exists if added in a file as a header. It may or may not have field values defined.'
      - term: 'Field value'
        definition: 'An individual entry in a field. Represented, in a table, as a single cell.'
      - term: 'Service day'
        definition: 'A service day is a time period used to indicate route scheduling. The exact definition of service day varies from agency to agency but service days often do not correspond with calendar days. A service day may exceed 24:00:00 if service begins on one day and ends on a following day. For example, service that runs from 08:00:00 on Friday to 02:00:00 on Saturday, could be denoted as running from 08:00:00 to 26:00:00 on a single service day.'
      - term: 'Text-to-speech field'
        definition: 'The field should contain the same information than its parent field (on which it falls back if it is empty). It is aimed to be read as text-to-speech, therefore, abbreviation should be either removed ("St" should be either read as "Street" or "Saint"; "Elizabeth I" should be "Elizabeth the first") or kept to be read as it ("JFK Airport" is said abbreviated).'
      - term: 'Leg'
        definition: 'Travel in which a rider boards and alights between a pair of subsequent locations along a trip.'
      - term: 'Journey'
        definition: 'Overall travel from origin to destination, including all legs and transfers in-between.'
      - term: 'Sub-journey'
        definition: 'Two or more legs that comprise a subset of a journey.'
      - term: 'Fare product'
        definition: 'Purchassable fare products that can be used to pay for or validate travel.'
      - term: 'Effective Fare Leg'
        definition: 'A sub-journey of two or more legs that should be treated as a single leg for matching rules in fare_leg_rules.txt for the purposes of fare calculation.'
  
  presence:
    description: 'Presence conditions applicable to fields and files.'
    conditions:
      - name: 'Required'
        definition: 'The field or file must be included in the dataset and contain a valid value for each record.'
      - name: 'Optional'
        definition: 'The field or file may be omitted from the dataset.'
      - name: 'Conditionally Required'
        definition: 'The field or file must be included under conditions outlined in the field or file description.'
      - name: 'Conditionally Forbidden'
        definition: 'The field or file must not be included under conditions outlined in the field or file description.'
      - name: 'Recommended'
        definition: 'The field or file may be omitted from the dataset, but it is a best practice to include it. Before omitting this field or file, the best practice should be carefully evaluated and the full implications of omission should be understood.'

  field_types:
    description: "Field types applicable to fields."
    types:
      - name: 'Color'
        definition: 'A color encoded as a six-digit hexadecimal number. Refer to https://htmlcolorcodes.com to generate a valid value (the leading "#" must not be included).'
        example: 'FFFFFF for white, 000000 for black or 0039A6 for the A,C,E lines in NYMTA.'
      - name: 'Currency code'
        definition: 'An ISO 4217 alphabetical currency code. For the list of current currency, refer to https://en.wikipedia.org/wiki/ISO_4217#Active_codes.'
        example: 'CAD for Canadian dollars, EUR for euros or JPY for Japanese yen.'
      - name: 'Currency amount'
        definition: 'A decimal value indicating a currency amount. The number of decimal places is specified by ISO 4217 for the accompanying Currency code. All financial calculations should be processed as decimal, currency, or another equivalent type suitable for financial calculations depending on the programming language used to consume data. Processing currency amounts as float is discouraged due to gains or losses of money during calculations.'
      - name: 'Date'
        definition: 'Service day in the YYYYMMDD format. Since time within a service day may be above 24:00:00, a service day may contain information for the subsequent day(s).'
        example: '20180913 for September 13th, 2018.'
      - name: 'Email'
        definition: 'An email address.'
        example: 'example@example.com'
      - name: 'Enum'
        definition: 'An option from a set of predefined constants defined in the Description column.'
        example: 'The route_type field contains a 0 for tram, a 1 for subway...'
      - name: 'ID'
        definition: 'An ID field value is an internal ID, not intended to be shown to riders, and is a sequence of any UTF-8 characters. Using only printable ASCII characters is recommended. An ID is labeled "unique ID" when it must be unique within a file. IDs defined in one .txt file are often referenced in another .txt file. IDs that reference an ID in another table are labeled "foreign ID".'
        example: The `stop_id` field in [stops.txt](#stopstxt) is a "unique ID". The `parent_station` field in [stops.txt](#stopstxt) is a "foreign ID referencing `stops.stop_id`".
      - name: 'Language code'
        definition: 'An IETF BCP 47 language code. For an introduction to IETF BCP 47, refer to http://www.rfc-editor.org/rfc/bcp/bcp47.txt and http://www.w3.org/International/articles/language-tags/.'
        example: '`en` for English, `en-US` for American English or `de` for German.'
      - name: 'Latitude'
        definition: 'WGS84 latitude in decimal degrees. The value must be greater than or equal to -90.0 and less than or equal to 90.0.'
        example: '`41.890169` for the Colosseum in Rome.'
      - name: 'Longitude'
        definition: 'WGS84 longitude in decimal degrees. The value must be greater than or equal to -180.0 and less than or equal to 180.0.'
        example: '`12.492269` for the Colosseum in Rome.'
      - name: 'Float'
        definition: 'A floating point number.'
      - name: 'Integer'
        definition: 'An integer.'
      - name: 'Phone number'
        definition: 'A phone number.'
      - name: 'Time'
        definition: 'Time in the HH:MM:SS format (H:MM:SS is also accepted). The time is measured from "noon minus 12h" of the service day (effectively midnight except for days on which daylight savings time changes occur). For times occurring after midnight on the service day, enter the time as a value greater than 24:00:00 in HH:MM:SS.'
        example: '`14:30:00` for 2:30PM or `25:35:00` for 1:35AM on the next day.'
      - name: 'Local time'
        definition: 'Time in the HH:MM:SS format (H:MM:SS is also accepted). Represents a wall-clock time shown in the local time of the specified location.'
      - name: 'Text'
        definition: 'A string of UTF-8 characters, which is aimed to be displayed and which must therefore be human readable.'
      - name: 'Timezone'
        definition: 'TZ timezone from the https://www.iana.org/time-zones. Timezone names never contain the space character but may contain an underscore. Refer to http://en.wikipedia.org/wiki/List_of_tz_zones for a list of valid values.'
        example: '`Asia/Tokyo`, `America/Los_Angeles` or `Africa/Cairo`.'
      - name: 'URL'
        definition: 'A fully qualified URL that includes http:// or https://, and any special characters in the URL must be correctly escaped. See the following http://www.w3.org/Addressing/URL/4_URI_Recommentations.html for a description of how to create fully qualified URL values.'
  
  field_signs:
    description: 'Signs applicable to Float or Integer field types.'
    signs:
      - name: 'Non-negative'
        definition: 'Greater than or equal to 0.'
      - name: 'Non-zero'
        definition: 'Not equal to 0.'
      - name: 'Positive'
        definition: 'Greater than 0.'
    example: 'Non-negative float: A floating point number greater than or equal to 0.'

  dataset_attributes:
    description: 'Attributes that apply to the entire dataset.'
    attributes:
      - name: 'Primary key'
        definition: 'The primary key of a dataset is the field or combination of fields that uniquely identify a row. Primary key (*) is used when all provided fields for a file are used to uniquely identify a row. Primary key (none) means that the file allows only one row.'
        example: 'The trip_id and stop_sequence fields make the primary key of stop_times.txt.'
      
dataset_files:
  description: 'This specification defines the following files.'
  files:
    - name: 'agency.txt'
      presence: 'Required'
      description: 'Transit agencies with service represented in this dataset.'
    - name: 'stops.txt'
      presence: 'Conditionally Required'
      description: 'Stops where vehicles pick up or drop off riders. Also defines stations and station entrances.'
      conditions: 'Conditionally Required: Optional if demand-responsive zones are defined in locations.geojson. Required otherwise.'
    - name: 'routes.txt'
      presence: 'Required'
      description: 'Transit routes. A route is a group of trips that are displayed to riders as a single service.'
    - name: 'trips.txt'
      presence: 'Required'
      description: 'Trips for each route. A trip is a sequence of two or more stops that occur during a specific time period.'
    - name: 'stop_times.txt'
      presence: 'Required'
      description: 'Times that a vehicle arrives at and departs from stops for each trip.'
    - name: 'calendar.txt'
      presence: 'Conditionally Required'
      description: 'Service dates specified using a weekly schedule with start and end dates.'
      conditions: 'Conditionally Required: Required unless all dates of service are defined in calendar_dates.txt. Optional otherwise.'
    - name: 'calendar_dates.txt'
      presence: 'Conditionally Required'
      description: 'Exceptions for the services defined in the calendar.txt.'
      conditions: 'Conditionally Required: Required if calendar.txt is omitted. In which case calendar_dates.txt must contain all dates of service. Optional otherwise.'
    - name: 'fare_attributes.txt'
      presence: 'Optional'
      description: 'Fare information for a transit agency''s routes.'
    - name: 'fare_rules.txt'
      presence: 'Optional'
      description: 'Rules to apply fares for itineraries.'
    - name: 'timeframes.txt'
      presence: 'Optional'
      description: 'Date and time periods to use in fare rules for fares that depend on date and time factors.'
    - name: 'rider_categories.txt'
      presence: 'Optional'
      description: 'Defines categories of riders (e.g. elderly, student).'
    - name: 'fare_media.txt'
      presence: 'Optional'
      description: 'To describe the fare media that can be employed to use fare products.'
      notes: 'File fare_media.txt describes concepts that are not represented in fare_attributes.txt and fare_rules.txt. As such, the use of fare_media.txt is entirely separate from files fare_attributes.txt and fare_rules.txt.'
    - name: 'fare_products.txt'
      presence: 'Optional'
      description: 'To describe the different types of tickets or fares that can be purchased by riders.'
      notes: 'File fare_products.txt describes fare products that are not represented in fare_attributes.txt and fare_rules.txt. As such, the use of fare_products.txt is entirely separate from files fare_attributes.txt and fare_rules.txt.'
    - name: 'fare_leg_rules.txt'
      presence: 'Optional'
      description: 'Fare rules for individual legs of travel.'
      notes: 'File fare_leg_rules.txt provides a more detailed method for modeling fare structures. As such, the use of fare_leg_rules.txt is entirely separate from files fare_attributes.txt and fare_rules.txt.'
    - name: 'fare_leg_join_rules.txt'
      presence: 'Optional'
      description: 'Rules for defining two or more legs should be considered as a single effective fare leg for the purposes of matching against rules in fare_leg_rules.txt'
    - name: 'fare_transfer_rules.txt'
      presence: 'Optional'
      description: 'Fare rules for transfers between legs of travel.'
      notes: 'Along with fare_leg_rules.txt, file fare_transfer_rules.txt provides a more detailed method for modeling fare structures. As such, the use of fare_transfer_rules.txt is entirely separate from files fare_attributes.txt and fare_rules.txt.'
    - name: 'areas.txt'
      presence: 'Optional'
      description: 'Area grouping of locations.'
    - name: 'stop_areas.txt'
      presence: 'Optional'
      description: 'Rules to assign stops to areas.'
    - name: 'networks.txt'
      presence: 'Conditionally Forbidden'
      description: 'Network grouping of routes.'
      conditions: 'Conditionally Forbidden: Forbidden if network_id exists in routes.txt. Optional otherwise.'
    - name: 'route_networks.txt'
      presence: 'Conditionally Forbidden'
      description: 'Rules to assign routes to networks.'
      conditions: 'Conditionally Forbidden: Forbidden if network_id exists in routes.txt. Optional otherwise.'
    - name: 'shapes.txt'
      presence: 'Optional'
      description: 'Rules for mapping vehicle travel paths, sometimes referred to as route alignments.'
    - name: 'frequencies.txt'
      presence: 'Optional'
      description: 'Headway (time between trips) for headway-based service or a compressed representation of fixed-schedule service.'
    - name: 'transfers.txt'
      presence: 'Optional'
      description: 'Rules for making connections at transfer points between routes.'
    - name: 'pathways.txt'
      presence: 'Optional'
      description: 'Pathways linking together locations within stations.'
    - name: 'levels.txt'
      presence: 'Conditionally Required'
      description: 'Levels within stations.'
      conditions: 'Conditionally Required: Required when describing pathways with elevators (pathway_mode=5). Optional otherwise.'
    - name: 'location_groups.txt'
      presence: 'Optional'
      description: 'A group of stops that together indicate locations where a rider may request pickup or drop off.'
    - name: 'location_group_stops.txt'
      presence: 'Optional'
      description: 'Rules to assign stops to location groups.'
    - name: 'locations.geojson'
      presence: 'Optional'
      description: 'Zones for rider pickup or drop-off requests by on-demand services, represented as GeoJSON polygons.'
    - name: 'booking_rules.txt'
      presence: 'Optional'
      description: 'Booking information for rider-requested services.'
    - name: 'translations.txt'
      presence: 'Optional'
      description: 'Translations of customer-facing dataset values.'
    - name: 'feed_info.txt'
      presence: 'Conditionally Required'
      description: 'Dataset metadata, including publisher, version, and expiration information.'
      conditions: 'Conditionally Required: Required if translations.txt is provided. Recommended otherwise.'
    - name: 'attributions.txt'
      presence: 'Optional'
      description: 'Dataset attributions.'

file_requirements:
  description: 'The following requirements apply to the format and contents of the dataset files.'
  requirements:
    - 'All files must be saved as comma-delimited text.'
    - 'The first line of each file must contain field names. Each subsection of the Field Definitions section corresponds to one of the files in a GTFS dataset and lists the field names that may be used in that file.'
    - 'All file and field names are case-sensitive.'
    - 'Field values must not contain tabs, carriage returns or new lines.'
    - 'Field values that contain quotation marks or commas must be enclosed within quotation marks. In addition, each quotation mark in the field value must be preceded with a quotation mark. This is consistent with the manner in which Microsoft Excel outputs comma-delimited (CSV) files. For more information on the CSV file format, see http://tools.ietf.org/html/rfc4180.'
    - 'Field values must not contain HTML tags, comments or escape sequences.'
    - 'Extra spaces between fields or field names should be removed. Many parsers consider the spaces to be part of the value, which may cause errors.'
    - 'Each line must end with a CRLF or LF linebreak character.'
    - 'Files should be encoded in UTF-8 to support all Unicode characters. Files that include the Unicode byte-order mark (BOM) character are acceptable. See http://unicode.org/faq/utf_bom.html#BOM for more information on the BOM character and UTF-8.'
    - 'All dataset files must be zipped together. The files must reside at the root level directly, not in a subfolder.'
    - 'All customer-facing text strings (including stop names, route names, and headsigns) should use Mixed Case (not ALL CAPS), following local conventions for capitalization of place names on displays capable of displaying lower case characters (e.g. "Brighton Churchill Square", "Villiers-sur-Marne", "Market Street").'
    - 'The use of abbreviations should be avoided throughout the feed for names and other text (e.g. St. for Street) unless a location is called by its abbreviated name (e.g. "JFK Airport"). Abbreviations may be problematic for accessibility by screen reader software and voice user interfaces. Consuming software can be engineered to reliably convert full words to abbreviations for display, but converting from abbreviations to full words is prone to more risk of error.'
  csv_example:
    original_value: 'Contains "quotes", commas and text'
    csv_value: '"Contains ""quotes"", commas and text"'

dataset_publishing:
  description: 'General practices for publishing a GTFS dataset.'
  practices:
    - 'Datasets should be published at a public, permanent URL, including the zip file name. (e.g., www.agency.org/gtfs/gtfs.zip). Ideally, the URL should be directly downloadable without requiring login to access the file, to facilitate download by consuming software applications. While it is recommended (and the most common practice) to make a GTFS dataset openly downloadable, if a data provider does need to control access to GTFS for licensing or other reasons, it is recommended to control access to the GTFS dataset using API keys, which will facilitate automatic downloads.'
    - 'GTFS data should be published in iterations so that a single file at a stable location always contains the latest official description of service for a transit agency (or agencies).'
    - 'Datasets should maintain persistent identifiers (id fields) for stop_id, route_id, and agency_id across data iterations whenever possible.'
    - 'One GTFS dataset should contain current and upcoming service (sometimes called a "merged" dataset). There are multiple merge tools available that can be used to create a merged dataset from two different GTFS feeds.'
    - 'At any time, the published GTFS dataset should be valid for at least the next 7 days, and ideally for as long as the operator is confident that the schedule will continue to be operated.'
    - 'If possible, the GTFS dataset should cover at least the next 30 days of service.'
    - 'Old services (expired calendars) should be removed from the feed.'
    - 'If a service modification will go into effect in 7 days or fewer, this service change should be expressed through a GTFS-realtime feed (service advisories or trip updates) rather than static GTFS dataset.'
    - 'The web-server hosting GTFS data should be configured to correctly report the file modification date (see HTTP/1.1 - Request for Comments 2616, under Section 14.29).'

field_definitions:
  description: 'This section defines the fields that may be used in each file of a GTFS dataset.'
  files:
  
    - file: 'agency.txt'
      presence: 'Required'
      primary_key: 'agency_id'
      fields: 
        - name: 'agency_id'
          type: 'Unique ID'
          presence: 'Conditionally Required'
          description: 'Identifies a transit brand which is often synonymous with a transit agency. Note that in some cases, such as when a single agency operates multiple separate services, agencies and brands are distinct. This document uses the term "agency" in place of "brand". A dataset may contain data from multiple agencies.'
          conditions: 
            - 'Required when the dataset contains data for multiple transit agencies.'
            - 'Recommended otherwise.'
        - name: 'agency_name'
          type: 'Text'
          presence: 'Required'
          description: 'Full name of the transit agency.'
        - name: 'agency_url'
          type: 'URL'
          presence: 'Required'
          description: 'URL of the transit agency.'
        - name: 'agency_timezone'
          type: 'Timezone'
          presence: 'Required'
          description: 'Timezone where the transit agency is located. If multiple agencies are specified in the dataset, each must have the same agency_timezone.'
        - name: 'agency_lang'
          type: 'Language code'
          presence: 'Optional'
          description: 'Primary language used by this transit agency. Should be provided to help GTFS consumers choose capitalization rules and other language-specific settings for the dataset.'
        - name: 'agency_phone'
          type: 'Phone number'
          presence: 'Optional'
          description: 'A voice telephone number for the specified agency. This field is a string value that presents the telephone number as typical for the agency''s service area. It may contain punctuation marks to group the digits of the number. Dialable text (for example, TriMet''s "503-238-RIDE") is permitted, but the field must not contain any other descriptive text.'
        - name: 'agency_fare_url'
          type: 'URL'
          presence: 'Optional'
          description: 'URL of a web page where a rider can purchase tickets or other fare instruments for that agency, or a web page containing information about that agency''s fares.'
        - name: 'agency_email'
          type: 'Email'
          presence: 'Optional'
          description: 'Email address actively monitored by the agency''s customer service department. This email address should be a direct contact point where transit riders can reach a customer service representative at the agency.'
        - name: 'cemv_support'
          type: 'Enum'
          presence: 'Optional'
          description: 'Indicates if riders can access a transit service (i.e., trip) associated with this agency by using a contactless EMV (Europay, Mastercard, and Visa) card or mobile device as fare media at a fare validator (such as in pay-as-you-go or open-loop systems). This field does not indicate that cEMV can be used to purchase other fare products or to add value to another fare media. Support for cEMVs should only be indicated if all services under this agency are accessible with the use of cEMV cards or mobile devices as fare media. If both agency.cemv_support and routes.cemv_support are provided for the same service, the value in routes.cemv_support shall take precedence. This field is independent of all other fare-related files and may be used separately. If there is conflicting information between this field and any fare-related file (such as fare_media.txt, fare_products.txt, or fare_leg_rules.txt), the information in those files shall take precedence over agency.cemv_support.'
          options:
            - value: '0 or empty'
              description: 'No cEMV information for trips associated with this agency.'
            - value: '1'
              description: 'Riders may use cEMVs as fare media for trips associated with this agency.'
            - value: '2'
              description: 'cEMVs are not supported as fare media for trips associated with this agency.'
    
    - file: 'stops.txt'
      presence: 'Conditionally Required'
      primary_key: 'stop_id'
      fields: 
        - name: 'stop_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a location: stop/platform, station, entrance/exit, generic node or boarding area (see location_type).'
          notes:
            - 'ID must be unique across all stops.stop_id, locations.geojson id, and location_groups.location_group_id values.'
            - 'Multiple routes may use the same stop_id.'
        - name: 'stop_code'
          type: 'Text'
          presence: 'Optional'
          description: 'Short text or a number that identifies the location for riders. These codes are often used in phone-based transit information systems or printed on signage to make it easier for riders to get information for a particular location. The stop_code may be the same as stop_id if it is public facing. This field should be left empty for locations without a code presented to riders.'
        - name: 'stop_name'
          type: 'Text'
          presence: 'Conditionally Required'
          description: 'Name of the location. The stop_name should match the agency''s rider-facing name for the location as printed on a timetable, published online, or represented on signage. For translations into other languages, use translations.txt. When the location is a boarding area (location_type=4), the stop_name should contains the name of the boarding area as displayed by the agency. It could be just one letter (like on some European intercity railway stations), or text like "Wheelchair boarding area" (NYC''s Subway) or "Head of short trains" (Paris'' RER).'
          conditions:
            - 'Required for locations which are stops (location_type=0), stations (location_type=1) or entrances/exits (location_type=2).'
            - 'Optional for locations which are generic nodes (location_type=3) or boarding areas (location_type=4).'
        - name: 'tts_stop_name'
          type: 'Text'
          presence: 'Optional'
          description: 'Readable version of the stop_name. See "Text-to-speech field" in the Term Definitions for more.'
        - name: 'stop_desc'
          type: 'Text'
          presence: 'Optional'
          description: 'Description of the location that provides useful, quality information. Should not be a duplicate of stop_name.'
        - name: 'stop_lat'
          type: 'Latitude'
          presence: 'Conditionally Required'
          description: 'Latitude of the location. For stops/platforms (location_type=0) and boarding area (location_type=4), the coordinates must be the ones of the bus pole — if exists — and otherwise of where the travelers are boarding the vehicle (on the sidewalk or the platform, and not on the roadway or the track where the vehicle stops).'
          conditions:
            - 'Required for locations which are stops (location_type=0), stations (location_type=1) or entrances/exits (location_type=2).'
            - 'Optional for locations which are generic nodes (location_type=3) or boarding areas (location_type=4).'
        - name: 'stop_lon'
          type: 'Longitude'
          presence: 'Conditionally Required'
          description: 'Longitude of the location. For stops/platforms (location_type=0) and boarding area (location_type=4), the coordinates must be the ones of the bus pole — if exists — and otherwise of where the travelers are boarding the vehicle (on the sidewalk or the platform, and not on the roadway or the track where the vehicle stops).'
          conditions:
            - 'Required for locations which are stops (location_type=0), stations (location_type=1) or entrances/exits (location_type=2).'
            - 'Optional for locations which are generic nodes (location_type=3) or boarding areas (location_type=4).'
        - name: 'zone_id'
          type: 'ID'
          presence: 'Optional'
          description: 'Identifies the fare zone for a stop. If this record represents a station or station entrance, the zone_id is ignored.'
        - name: 'stop_url'
          type: 'URL'
          presence: 'Optional'
          description: 'URL of a web page about the location. This should be different from the agency.agency_url and the routes.route_url field values.'
        - name: 'location_type'
          type: 'Enum'
          presence: 'Optional'
          description: 'Location type.'
          options:
            - value: '0 (or empty)'
              description: 'Stop (or Platform). A location where passengers board or disembark from a transit vehicle. Is called a platform when defined within a parent_station.'
            - value: '1'
              description: 'Station. A physical structure or area that contains one or more platform.'
            - value: '2'
              description: 'Entrance/Exit. A location where passengers can enter or exit a station from the street. If an entrance/exit belongs to multiple stations, it may be linked by pathways to both, but the data provider must pick one of them as parent.'
            - value: '3'
              description: 'Generic Node. A location within a station, not matching any other location_type, that may be used to link together pathways define in pathways.txt.'
            - value: '4'
              description: 'Boarding Area. A specific location on a platform, where passengers can board and/or alight vehicles.'
        - name: 'parent_station'
          type: 'Foreign ID referencing stops.stop_id'
          foreign_key: 'stops.stop_id'
          presence: 'Conditionally Required'
          description: 'Defines hierarchy between the different locations defined in stops.txt. It contains the ID of the parent location, as followed: Stop/platform (location_type=0): the parent_station field contains the ID of a station. Station (location_type=1): this field must be empty. Entrance/exit (location_type=2) or generic node (location_type=3): the parent_station field contains the ID of a station (location_type=1). Boarding Area (location_type=4): the parent_station field contains ID of a platform.'
          conditions:
            - 'Required for locations which are entrances (location_type=2), generic nodes (location_type=3) or boarding areas (location_type=4).'
            - 'Optional for stops/platforms (location_type=0).'
            - 'Forbidden for stations (location_type=1).'
        - name: 'stop_timezone'
          type: 'Timezone'
          presence: 'Optional'
          description: 'Timezone of the location. If the location has a parent station, it inherits the parent station''s timezone instead of applying its own. Stations and parentless stops with empty stop_timezone inherit the timezone specified by agency.agency_timezone. The times provided in stop_times.txt are in the timezone specified by agency.agency_timezone, not stop_timezone. This ensures that the time values in a trip always increase over the course of a trip, regardless of which timezones the trip crosses.'
        - name: 'wheelchair_boarding'
          type: 'Enum'
          presence: 'Optional'
          description: 'Indicates whether wheelchair boardings are possible from the location.'
          options:
            - category: 'For parentless stops'
              values:
                - value: '0 or empty'
                  description: 'No accessibility information for the stop.'
                - value: '1'
                  description: 'Some vehicles at this stop can be boarded by a rider in a wheelchair.'
                - value: '2'
                  description: 'Wheelchair boarding is not possible at this stop.'
            - category: 'For child stops'
              values:
                - value: '0 or empty'
                  description: 'Stop will inherit its wheelchair_boarding behavior from the parent station, if specified in the parent.'
                - value: '1'
                  description: 'There exists some accessible path from outside the station to the specific stop/platform.'
                - value: '2'
                  description: 'There exists no accessible path from outside the station to the specific stop/platform.'
            - category: 'For station entrances/exits'
              values:
                - value: '0 or empty'
                  description: 'Station entrance will inherit its wheelchair_boarding behavior from the parent station, if specified for the parent.'
                - value: '1'
                  description: 'Station entrance is wheelchair accessible.'
                - value: '2'
                  description: 'No accessible path from station entrance to stops/platforms.'
        - name: 'level_id'
          type: 'Foreign ID referencing levels.level_id'
          presence: 'Optional'
          description: 'Level of the location. The same level may be used by multiple unlinked stations.'
        - name: 'platform_code'
          type: 'Text'
          presence: 'Optional'
          description: 'Platform identifier for a platform stop (a stop belonging to a station). This should be just the platform identifier (eg. "G" or "3"). Words like "platform" or "track" (or the feed''s language-specific equivalent) should not be included. This allows feed consumers to more easily internationalize and localize the platform identifier into other languages.'
        - name: 'stop_access'
          type: 'Enum'
          presence: 'Conditionally Forbidden'
          description: 'Indicates how the stop is accessed for a particular station. When stop_access is empty, the access for the specified stop or platform is considered undefined.'
          options:
            - value: '0'
              description: 'The stop/platform cannot be directly accessed from the street network. It must be accessed from a station entrance if there is one defined for the station, otherwise the station itself. If there are pathways defined for the station, they must be used to access the stop/platform.'
            - value: '1'
              description: 'Consuming applications should generate directions for access directly to the stop, independent of any entrances or pathways of the parent station.'
          conditions:
            - 'Forbidden for locations which are stations (location_type=1), entrances (location_type=2), generic nodes (location_type=3) or boarding areas (location_type=4).'
            - 'Forbidden if parent_station is empty.'
            - 'Optional otherwise.'
    
    - file: 'routes.txt'
      presence: 'Required'
      primary_key: 'route_id'
      fields:
        - name: 'route_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a route.'
        - name: 'agency_id'
          type: 'Foreign ID'
          foreign_key: 'agency.agency_id'
          presence: 'Conditionally Required'
          description: 'Agency for the specified route.'
          conditions:
            - 'Required if multiple agencies are defined in agency.txt.'
            - 'Recommended otherwise.'
        - name: 'route_short_name'
          type: 'Text'
          presence: 'Conditionally Required'
          description: 'Short name of a route. Often a short, abstract identifier (e.g., "32", "100X", "Green") that riders use to identify a route. Both route_short_name and route_long_name may be defined.'
          conditions:
            - 'Required if routes.route_long_name is empty.'
            - 'Recommended if there is a brief service designation. This should be the commonly-known passenger name of the service, and should be no longer than 12 characters.'
        - name: 'route_long_name'
          type: 'Text'
          presence: 'Conditionally Required'
          description: 'Full name of a route. This name is generally more descriptive than the route_short_name and often includes the route''s destination or stop. Both route_short_name and route_long_name may be defined.'
          conditions:
            - 'Required if routes.route_short_name is empty.'
            - 'Optional otherwise.'
        - name: 'route_desc'
          type: 'Text'
          presence: 'Optional'
          description: 'Description of a route that provides useful, quality information. Should not be a duplicate of route_short_name or route_long_name.'
          example: '"A" trains operate between Inwood-207 St, Manhattan and Far Rockaway-Mott Avenue, Queens at all times. Also from about 6AM until about midnight, additional "A" trains operate between Inwood-207 St and Lefferts Boulevard (trains typically alternate between Lefferts Blvd and Far Rockaway).'
        - name: 'route_type'
          type: 'Enum'
          presence: 'Required'
          description: 'Indicates the type of transportation used on a route.'
          options:
            - value: '0'
              description: 'Tram, Streetcar, Light rail. Any light rail or street level system within a metropolitan area.'
            - value: '1'
              description: 'Subway, Metro. Any underground rail system within a metropolitan area.'
            - value: '2'
              description: 'Rail. Used for intercity or long-distance travel.'
            - value: '3'
              description: 'Bus. Used for short- and long-distance bus routes.'
            - value: '4'
              description: 'Ferry. Used for short- and long-distance boat service.'
            - value: '5'
              description: 'Cable tram. Used for street-level rail cars where the cable runs beneath the vehicle (e.g., cable car in San Francisco).'
            - value: '6'
              description: 'Aerial lift, suspended cable car (e.g., gondola lift, aerial tramway). Cable transport where cabins, cars, gondolas or open chairs are suspended by means of one or more cables.'
            - value: '7'
              description: 'Funicular. Any rail system designed for steep inclines.'
            - value: '11'
              description: 'Trolleybus. Electric buses that draw power from overhead wires using poles.'
            - value: '12'
              description: 'Monorail. Railway in which the track consists of a single rail or a beam.'
        - name: 'route_url'
          type: 'URL'
          presence: 'Optional'
          description: 'URL of a web page about the particular route. Should be different from the agency.agency_url value.'
        - name: 'route_color'
          type: 'Color'
          presence: 'Optional'
          description: 'Route color designation that matches public facing material. Defaults to white (FFFFFF) when omitted or left empty. The color difference between route_color and route_text_color should provide sufficient contrast when viewed on a black and white screen.'
        - name: 'route_text_color'
          type: 'Color'
          presence: 'Optional'
          description: 'Legible color to use for text drawn against a background of route_color. Defaults to black (000000) when omitted or left empty. The color difference between route_color and route_text_color should provide sufficient contrast when viewed on a black and white screen.'
        - name: 'route_sort_order'
          type: 'Non-negative integer'
          presence: 'Optional'
          description: 'Orders the routes in a way which is ideal for presentation to customers. Routes with smaller route_sort_order values should be displayed first.'
        - name: 'continuous_pickup'
          type: 'Enum'
          presence: 'Conditionally Forbidden'
          description: 'Indicates that the rider can board the transit vehicle at any point along the vehicle''s travel path as described by shapes.txt, on every trip of the route. Values for routes.continuous_pickup may be overridden by defining values in stop_times.continuous_pickup for specific stop_times along the route.'
          options:
            - value: '0'
              description: 'Continuous stopping pickup.'
            - value: '1 or empty'
              description: 'No continuous stopping pickup.'
            - value: '2'
              description: 'Must phone agency to arrange continuous stopping pickup.'
            - value: '3'
              description: 'Must coordinate with driver to arrange continuous stopping pickup.'
          conditions:
            - 'Any value other than 1 or empty is Forbidden if stop_times.start_pickup_drop_off_window or stop_times.end_pickup_drop_off_window are defined for any trip of this route.'
            - 'Optional otherwise.'
        - name: 'continuous_drop_off'
          type: 'Enum'
          presence: 'Conditionally Forbidden'
          description: 'Indicates that the rider can alight from the transit vehicle at any point along the vehicle''s travel path as described by shapes.txt, on every trip of the route. Values for routes.continuous_drop_off may be overridden by defining values in stop_times.continuous_drop_off for specific stop_times along the route.'
          options:
            - value: '0'
              description: 'Continuous stopping drop off.'
            - value: '1 or empty'
              description: 'No continuous stopping drop off.'
            - value: '2'
              description: 'Must phone agency to arrange continuous stopping drop off.'
            - value: '3'
              description: 'Must coordinate with driver to arrange continuous stopping drop off.'
          conditions:
            - 'Any value other than 1 or empty is Forbidden if stop_times.start_pickup_drop_off_window or stop_times.end_pickup_drop_off_window are defined for any trip of this route.'
            - 'Optional otherwise.'
        - name: 'network_id'
          type: 'ID'
          presence: 'Conditionally Forbidden'
          description: 'Identifies a group of routes. Multiple rows in routes.txt may have the same network_id.'
          conditions:
            - 'Forbidden if the route_networks.txt or networks.txt file exists.'
            - 'Optional otherwise.'
        - name: 'cemv_support'
          type: 'Enum'
          presence: 'Optional'
          description: 'Indicates if riders can access a transit service (i.e., trip) associated with this route by using a contactless EMV (Europay, Mastercard, and Visa) card or mobile device as fare media at a fare validator (such as in pay-as-you-go or open-loop systems). This field does not indicate that cEMV can be used to purchase other fare products or to add value to another fare media. Support for cEMVs should only be indicated if all services under this route are accessible with the use of cEMV cards or mobile devices as fare media. If both agency.cemv_support and routes.cemv_support are provided for the same service, the value in routes.cemv_support shall take precedence. This field is independent of all other fare-related files and may be used separately. If there is conflicting information between this field and any fare-related file (such as fare_media.txt, fare_products.txt, or fare_leg_rules.txt), the information in those files shall take precedence over agency.cemv_support.'
          options:
            - value: '0 or empty'
              description: 'No cEMV information for trips associated with this route.'
            - value: '1'
              description: 'Riders may use cEMVs as fare media for trips associated with this route.'
            - value: '2'
              description: 'cEMVs are not supported as fare media for trips associated with this route.'
    
    - file: 'shapes.txt'
      presence: 'Optional'
      primary_key: 
        - 'shape_id'
        - 'shape_pt_sequence'
      description: 'Rules for mapping vehicle travel paths, sometimes referred to as route alignments.'
      fields:
        - name: 'shape_id'
          type: 'ID'
          presence: 'Required'
          description: 'Identifies a shape.'
        - name: 'shape_pt_lat'
          type: 'Latitude'
          presence: 'Required'
          description: 'Latitude of a shape point. Each record in shapes.txt represents a shape point used to define the shape.'
        - name: 'shape_pt_lon'
          type: 'Longitude'
          presence: 'Required'
          description: 'Longitude of a shape point.'
        - name: 'shape_pt_sequence'
          type: 'Non-negative integer'
          presence: 'Required'
          description: 'Sequence in which the shape points connect to form the shape. Values must increase along the trip but do not need to be consecutive.'
          example: 'If the shape "A_shp" has three points in its definition, the shapes.txt file might contain these records to define the shape: shape_id,shape_pt_lat,shape_pt_lon,shape_pt_sequence A_shp,37.61956,-122.48161,0 A_shp,37.64430,-122.41070,6 A_shp,37.65863,-122.30839,11'
        - name: 'shape_dist_traveled'
          type: 'Non-negative float'
          presence: 'Optional'
          description: 'Actual distance traveled along the shape from the first shape point to the point specified in this record. Used by trip planners to show the correct portion of the shape on a map. Values must increase along with shape_pt_sequence; they must not be used to show reverse travel along a route. Distance units must be consistent with those used in stop_times.txt.'
          notes: 'Recommended for routes that have looping or inlining (the vehicle crosses or travels over the same portion of alignment in one trip). If a vehicle retraces or crosses the route alignment at points in the course of a trip, shape_dist_traveled is important to clarify how portions of the points in shapes.txt line up correspond with records in stop_times.txt.'
          example: 'If a bus travels along the three points defined above for A_shp, the additional shape_dist_traveled values (shown here in kilometers) would look like this: shape_id,shape_pt_lat,shape_pt_lon,shape_pt_sequence,shape_dist_traveled A_shp,37.61956,-122.48161,0,0 A_shp,37.64430,-122.41070,6,6.8310 A_shp,37.65863,-122.30839,11,15.8765'

    - file: 'calendar.txt'
      presence: 'Conditionally Required'
      primary_key: 'service_id'
      fields:
        - name: 'service_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a set of dates when service is available for one or more routes.'
        - name: 'monday'
          type: 'Enum'
          presence: 'Required'
          description: 'Indicates whether the service operates on all Mondays in the date range specified by the start_date and end_date fields. Note that exceptions for particular dates may be listed in calendar_dates.txt.'
          options:
            - value: '1'
              description: 'Service is available for all Mondays in the date range.'
            - value: '0'
              description: 'Service is not available for Mondays in the date range.'
        - name: 'tuesday'
          type: 'Enum'
          presence: 'Required'
          description: 'Functions in the same way as monday except applies to Tuesdays.'
          options:
            - value: '1'
              description: 'Service is available for all Tuesdays in the date range.'
            - value: '0'
              description: 'Service is not available for Tuesdays in the date range.'
        - name: 'wednesday'
          type: 'Enum'
          presence: 'Required'
          description: 'Functions in the same way as monday except applies to Wednesdays.'
          options:
            - value: '1'
              description: 'Service is available for all Wednesdays in the date range.'
            - value: '0'
              description: 'Service is not available for Wednesdays in the date range.'
        - name: 'thursday'
          type: 'Enum'
          presence: 'Required'
          description: 'Functions in the same way as monday except applies to Thursdays.'
          options:
            - value: '1'
              description: 'Service is available for all Thursdays in the date range.'
            - value: '0'
              description: 'Service is not available for Thursdays in the date range.'
        - name: 'friday'
          type: 'Enum'
          presence: 'Required'
          description: 'Functions in the same way as monday except applies to Fridays.'
          options:
            - value: '1'
              description: 'Service is available for all Fridays in the date range.'
            - value: '0'
              description: 'Service is not available for Fridays in the date range.'
        - name: 'saturday'
          type: 'Enum'
          presence: 'Required'
          description: 'Functions in the same way as monday except applies to Saturdays.'
          options:
            - value: '1'
              description: 'Service is available for all Saturdays in the date range.'
            - value: '0'
              description: 'Service is not available for Saturdays in the date range.'
        - name: 'sunday'
          type: 'Enum'
          presence: 'Required'
          description: 'Functions in the same way as monday except applies to Sundays.'
          options:
            - value: '1'
              description: 'Service is available for all Sundays in the date range.'
            - value: '0'
              description: 'Service is not available for Sundays in the date range.'
        - name: 'start_date'
          type: 'Date'
          presence: 'Required'
          description: 'Start service day for the service interval.'
        - name: 'end_date'
          type: 'Date'
          presence: 'Required'
          description: 'End service day for the service interval. This service day is included in the interval.'

    - file: 'trips.txt'
      presence: 'Required'
      primary_key: 'trip_id'
      fields:
        - name: 'route_id'
          type: 'Foreign ID'
          foreign_key: 'routes.route_id'
          presence: 'Required'
          description: 'Identifies a route.'
        - name: 'service_id'
          type: 'Foreign ID'
          foreign_key: 'calendar.service_id'
          presence: 'Required'
          description: 'Identifies a set of dates when service is available for one or more routes.'
        - name: 'trip_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a trip.'
        - name: 'trip_headsign'
          type: 'Text'
          presence: 'Optional'
          description: 'Text that appears on signage identifying the trip''s destination to riders.'
        - name: 'trip_short_name'
          type: 'Text'
          presence: 'Optional'
          description: 'Public-facing text used to identify the trip to riders, for instance, to identify train numbers for commuter rail trips.'
        - name: 'direction_id'
          type: 'Enum'
          presence: 'Optional'
          description: 'Indicates the direction of travel for a trip.'
          options:
            - value: '0'
              description: 'Travel in one direction (e.g., outbound travel).'
            - value: '1'
              description: 'Travel in the opposite direction (e.g., inbound travel).'
        - name: 'block_id'
          type: 'ID'
          presence: 'Optional'
          description: 'Identifies the block to which the trip belongs.'
        - name: 'shape_id'
          type: 'Foreign ID'
          foreign_key: 'shapes.shape_id'
          presence: 'Conditionally Required'
          description: 'Identifies a geospatial shape describing the vehicle travel path for a trip.'
          conditions:
            - 'Required if the trip has continuous pickup or drop-off behavior defined either in routes.txt or in stop_times.txt.'
            - 'Optional otherwise.'
        - name: 'wheelchair_accessible'
          type: 'Enum'
          presence: 'Optional'
          description: 'Indicates wheelchair accessibility.'
          options: 
            - value: '0 or empty'
              description: 'No wheelchair accessibility information for the trip.'
            - value: '1'
              description: 'Vehicle being used on this particular trip can accommodate at least one rider in a wheelchair.'
            - value: '2'
              description: 'No riders in wheelchairs can be accommodated on this trip.'
        - name: 'bikes_allowed'
          type: 'Enum'
          presence: 'Optional'
          description: 'Indicates whether bikes are allowed.'
          options:
            - value: '0 or empty'
              description: 'No bike information for the trip.'
            - value: '1'
              description: 'Vehicle being used on this particular trip can accommodate at least one bicycle.'
            - value: '2'
              description: 'No bicycles are allowed on this trip.'
        - name: 'cars_allowed'
          type: 'Enum'
          presence: 'Optional'
          description: 'Indicates whether cars are allowed.'
          options:
            - value: '0 or empty'
              description: 'No car information for the trip.'
            - value: '1'
              description: 'Vehicle being used on this particular trip can accommodate at least one car.'
            - value: '2'
              description: 'No cars are allowed on this trip.'
      example:
        name: 'Blocks and service day'
        description: 'The example below is valid, with distinct blocks every day of the week.'
        records:
          - route_id: 'red'
            trip_id: 'trip_1'
            service_id: 'mon-tues-wed-thurs-fri-sat-sun'
            block_id: 'red_loop'
            first_stop_time: '22:00:00'
            last_stop_time: '22:55:00'
          - route_id: 'red'
            trip_id: 'trip_2'
            service_id: 'fri-sat-sun'
            block_id: 'red_loop'
            first_stop_time: '23:00:00'
            last_stop_time: '23:55:00'
          - route_id: 'red'
            trip_id: 'trip_3'
            service_id: 'fri-sat'
            block_id: 'red_loop'
            first_stop_time: '24:00:00'
            last_stop_time: '24:55:00'
          - route_id: 'red'
            trip_id: 'trip_4'
            service_id: 'mon-tues-wed-thurs'
            block_id: 'red_loop'
            first_stop_time: '20:00:00'
            last_stop_time: '20:50:00'
          - route_id: 'red'
            trip_id: 'trip_5'
            service_id: 'mon-tues-wed-thurs'
            block_id: 'red_loop'
            first_stop_time: '21:00:00'
            last_stop_time: '21:50:00'
        notes:
          - 'On Friday into Saturday morning, for example, a single vehicle operates trip_1, trip_2, and trip_3 (10:00 PM through 12:55 AM). Note that the last trip occurs on Saturday, 12:00 AM to 12:55 AM, but is part of the Friday “service day” because the times are 24:00:00 to 24:55:00.'
          - 'On Monday, Tuesday, Wednesday, and Thursday, a single vehicle operates trip_1, trip_4, and trip_5 in a block from 8:00 PM to 10:55 PM.'
  
    - file: 'stop_times.txt'
      presence: 'Required'
      primary_key: 
        - 'trip_id'
        - 'stop_sequence'
      fields:
        - name: 'trip_id'
          type: 'Foreign ID'
          foreign_key: 'trips.trip_id'
          presence: 'Required'
          description: 'Identifies a trip.'
        - name: 'arrival_time'
          type: 'Time'
          presence: 'Conditionally Required'
          description: 'Arrival time at the stop (defined by stop_times.stop_id) for a specific trip (defined by stop_times.trip_id) in the time zone specified by agency.agency_timezone, not stops.stop_timezone.'
          notes:
            - 'If there are not separate times for arrival and departure at a stop, arrival_time and departure_time should be the same.'
            - 'For times occurring after midnight on the service day, enter the time as a value greater than 24:00:00 in HH:MM:SS.'
            - 'If exact arrival and departure times (timepoint=1) are not available, estimated or interpolated arrival and departure times (timepoint=0) should be provided.'
          conditions:
            - 'Required for the first and last stop in a trip (defined by stop_times.stop_sequence).'
            - 'Required for timepoint=1.'
            - 'Forbidden when start_pickup_drop_off_window or end_pickup_drop_off_window are defined.'
            - 'Optional otherwise.'
        - name: 'departure_time'
          type: 'Time'
          presence: 'Conditionally Required'
          description: 'Departure time from the stop (defined by stop_times.stop_id) for a specific trip (defined by stop_times.trip_id) in the time zone specified by agency.agency_timezone, not stops.stop_timezone.'
          notes:
            - 'If there are not separate times for arrival and departure at a stop, arrival_time and departure_time should be the same.'
            - 'For times occurring after midnight on the service day, enter the time as a value greater than 24:00:00 in HH:MM:SS.'
            - 'If exact arrival and departure times (timepoint=1) are not available, estimated or interpolated arrival and departure times (timepoint=0) should be provided.'
          conditions:
            - 'Required for timepoint=1.'
            - 'Forbidden when start_pickup_drop_off_window or end_pickup_drop_off_window are defined.'
            - 'Optional otherwise.'
        - name: 'stop_id'
          type: 'Foreign ID'
          foreign_key: 'stops.stop_id'
          presence: 'Conditionally Required'
          description: 'Identifies the serviced stop.'
          notes:
            - 'All stops serviced during a trip must have a record in stop_times.txt. Referenced locations must be stops/platforms, i.e. their stops.location_type value must be 0 or empty. A stop may be serviced multiple times in the same trip, and multiple trips and routes may service the same stop.'
            - 'On-demand service using stops should be referenced in the sequence in which service is available at those stops. A data consumer should assume that travel is possible from one stop or location to any stop or location later in the trip, provided that the pickup/drop_off_type of each stop_time and the time constraints of each start/end_pickup_drop_off_window do not forbid it.'
          conditions:
            - 'Required if stop_times.location_group_id AND stop_times.location_id are NOT defined.'
            - 'Forbidden if stop_times.location_group_id or stop_times.location_id are defined.'
        - name: 'location_group_id'
          type: 'Foreign ID'
          foreign_key: 'location_groups.location_group_id'
          presence: 'Conditionally Forbidden'
          description: 'Identifies the serviced location group that indicates groups of stops where riders may request pickup or drop off.'
          notes:
            - 'All location groups serviced during a trip must have a record in stop_times.txt. Multiple trips and routes may service the same location group.'
            - 'On-demand service using location groups should be referenced in the sequence in which service is available at those location groups. A data consumer should assume that travel is possible from one stop or location to any stop or location later in the trip, provided that the pickup/drop_off_type of each stop_time and the time constraints of each start/end_pickup_drop_off_window do not forbid it.'
          conditions:
            - 'Forbidden if stop_times.stop_id or stop_times.location_id are defined.'
        - name: 'location_id'
          type: 'Foreign ID' 
          foreign_key: 'locations.geojson id'
          presence: 'Conditionally Forbidden'
          description: 'Identifies the GeoJSON location that corresponds to serviced zone where riders may request pickup or drop off.'
          notes:
            - 'All GeoJSON locations serviced during a trip must have a record in stop_times.txt. Multiple trips and routes may service the same GeoJSON location.'
            - 'On-demand service within locations should be referenced in the sequence in which service is available in those locations. A data consumer should assume that travel is possible from one stop or location to any stop or location later in the trip, provided that the pickup/drop_off_type of each stop_time and the time constraints of each start/end_pickup_drop_off_window do not forbid it.'
          conditions:
            - 'Forbidden if stop_times.stop_id or stop_times.location_group_id are defined.'
        - name: 'stop_sequence'
          type: 'Non-negative integer'
          presence: 'Required'
          description: 'Order of stops, location groups, or GeoJSON locations for a particular trip. The values must increase along the trip but do not need to be consecutive.'
          example: 'The first location on the trip could have a stop_sequence=1, the second location on the trip could have a stop_sequence=23, the third location could have a stop_sequence=40, and so on.'
          notes:
            - 'Travel within the same location group or GeoJSON location requires two records in stop_times.txt with the same location_group_id or location_id.'
        - name: 'stop_headsign'
          type: 'Text'
          presence: 'Optional'
          description: 'Text that appears on signage identifying the trip''s destination to riders. This field overrides the default trips.trip_headsign when the headsign changes between stops. If the headsign is displayed for an entire trip, trips.trip_headsign should be used instead.'
          notes: 
            - 'A stop_headsign value specified for one stop_time does not apply to subsequent stop_times in the same trip. If you want to override the trip_headsign for multiple stop_times in the same trip, the stop_headsign value must be repeated in each stop_time row.'
        - name: 'start_pickup_drop_off_window'
          type: 'Time'
          presence: 'Conditionally Required'
          description: 'Time that on-demand service becomes available in a GeoJSON location, location group, or stop.'
          conditions:
            - 'Required if stop_times.location_group_id or stop_times.location_id is defined.'
            - 'Required if end_pickup_drop_off_window is defined.'
            - 'Forbidden if arrival_time or departure_time is defined.'
            - 'Optional otherwise.'
        - name: 'end_pickup_drop_off_window'
          type: 'Time'
          presence: 'Conditionally Required'
          description: 'Time that on-demand service ends in a GeoJSON location, location group, or stop.'
          conditions:
            - 'Required if stop_times.location_group_id or stop_times.location_id is defined.'
            - 'Required if start_pickup_drop_off_window is defined.'
            - 'Forbidden if arrival_time or departure_time is defined.'
            - 'Optional otherwise.'
        - name: 'pickup_type'
          type: 'Enum'
          presence: 'Conditionally Forbidden'
          description: 'Indicates drop off method.'
          options:
            - value: '0 or empty'
              description: 'Regularly scheduled pickup.'
            - value: '1'
              description: 'No pickup available.'
            - value: '2'
              description: 'Must phone agency to arrange pickup.'
            - value: '3'
              description: 'Must coordinate with driver to arrange pickup.'
          conditions:
            - 'pickup_type=0 forbidden if start_pickup_drop_off_window or end_pickup_drop_off_window are defined.'
            - 'pickup_type=3 forbidden if start_pickup_drop_off_window or end_pickup_drop_off_window are defined.'
            - 'Optional otherwise.'
        - name: 'drop_off_type'
          type: 'Enum'
          presence: 'Conditionally Forbidden'
          description: 'Indicates drop off method.'
          options:
            - value: '0 or empty'
              description: 'Regularly scheduled drop off.'
            - value: '1'
              description: 'No drop off available.'
            - value: '2'
              description: 'Must phone agency to arrange drop off.'
            - value: '3'
              description: 'Must coordinate with driver to arrange drop off.'
          conditions:
            - 'drop_off_type=0 forbidden if start_pickup_drop_off_window or end_pickup_drop_off_window are defined.'
            - 'Optional otherwise.'
        - name: 'continuous_pickup'
          type: 'Enum'
          presence: 'Conditionally Forbidden'
          description: 'Indicates that the rider can board the transit vehicle at any point along the vehicle’s travel path as described by shapes.txt, from this stop_time to the next stop_time in the trip''s stop_sequence.'
          options:
            - value: '0'
              description: 'Continuous stopping pickup.'
            - value: '1 or empty'
              description: 'No continuous stopping pickup.'
            - value: '2'
              description: 'Must phone agency to arrange continuous stopping pickup.'
            - value: '3'
              description: 'Must coordinate with driver to arrange continuous stopping pickup.'
          notes:
            - 'If this field is populated, it overrides any continuous pickup behavior defined in routes.txt. If this field is empty, the stop_time inherits any continuous pickup behavior defined in routes.txt.'
          conditions:
            - 'Any value other than 1 or empty is Forbidden if start_pickup_drop_off_window or end_pickup_drop_off_window are defined.'
            - 'Optional otherwise.'
        - name: 'continuous_drop_off'
          type: 'Enum'
          presence: 'Conditionally Forbidden'
          description: 'Indicates that the rider can alight from the transit vehicle at any point along the vehicle’s travel path as described by shapes.txt, from this stop_time to the next stop_time in the trip''s stop_sequence.'
          options:
            - value: '0'
              description: 'Continuous stopping drop off.'
            - value: '1 or empty'
              description: 'No continuous stopping drop off.'
            - value: '2'
              description: 'Must phone agency to arrange continuous stopping drop off.'
            - value: '3'
              description: 'Must coordinate with driver to arrange continuous stopping drop off.'
          notes:
            - 'If this field is populated, it overrides any continuous drop-off behavior defined in routes.txt. If this field is empty, the stop_time inherits any continuous drop-off behavior defined in routes.txt.'
          conditions:
            - 'Any value other than 1 or empty is Forbidden if start_pickup_drop_off_window or end_pickup_drop_off_window are defined.'
            - 'Optional otherwise.'
        - name: 'shape_dist_traveled'
          type: 'Non-negative float'
          presence: 'Optional'
          description: 'Actual distance traveled along the associated shape, from the first stop to the stop specified in this record. This field specifies how much of the shape to draw between any two stops during a trip.'
          notes:
            - 'Must be in the same units used in shapes.txt.'
            - 'Values used for shape_dist_traveled must increase along with stop_sequence; they must not be used to show reverse travel along a route.'
            - 'Recommended for routes that have looping or inlining (the vehicle crosses or travels over the same portion of alignment in one trip).'
            - 'See shapes.shape_dist_traveled.'
          example: 'If a bus travels a distance of 5.25 kilometers from the start of the shape to the stop,shape_dist_traveled=5.25.'
        - name: 'timepoint'
          type: 'Enum'
          presence: 'Optional'
          description: 'Indicates if arrival and departure times for a stop are strictly adhered to by the vehicle or if they are instead approximate and/or interpolated times.'
          notes: 
            - 'This field allows a GTFS producer to provide interpolated stop-times, while indicating that the times are approximate.'
            - 'All records of stop_times.txt with defined arrival or departure times should have timepoint values populated.'
            - 'If no timepoint values are provided, all times are considered exact.'
          options:
            - value: '0'
              description: 'Times are considered approximate.'
            - value: '1'
              description: 'Times are considered exact.'
        - name: 'pickup_booking_rule_id'
          type: 'Foreign ID'
          foreign_key: 'booking_rules.booking_rule_id'
          presence: 'Optional'
          description: 'Identifies the boarding booking rule at this stop time.'
          notes:
            - 'Recommended when pickup_type=2.'
        - name: 'drop_off_booking_rule_id'
          type: 'Foreign ID'
          foreign_key: 'booking_rules.booking_rule_id'
          presence: 'Optional'
          description: 'Identifies the alighting booking rule at this stop time.'
          notes:
            - 'Recommended when drop_off_type=2.'
      explanation:
        title: 'On-demand Service Routing Behavior'
        notes:
          - 'When providing routing or travel time between the origin and destination, data consumers should ignore intermediate stop_times.txt records with the same trip_id that have start_pickup_drop_off_window and end_pickup_drop_off_window defined. For examples that demonstrate what should be ignored, see the data example page.'
          - 'Simultaneous overlap of locations.geojson id geometry, start/end_pickup_drop_off_window time, and pickup_type or drop_off_type between two or more stop_times.txt records with the same trip_id is forbidden. For examples that demonstrate what is forbidden, see the data example page.'

    - file: 'calendar_dates.txt'
      presence: 'Conditionally Required'
      primary_key:
        - 'service_id'
        - 'date'
      description: 'The calendar_dates.txt table explicitly activates or disables service by date.'
      notes:
        - 'Recommended: Use calendar_dates.txt in conjunction with calendar.txt to define exceptions to the default service patterns defined in calendar.txt. In this case calendar_dates.service_id is a foreign ID referencing calendar.service_id.'
        - 'Alternate: Omit calendar.txt, and specify each date of service in calendar_dates.txt. This allows for considerable service variation and accommodates service without normal weekly schedules. In this case service_id is an ID.'
      fields:
        - name: 'service_id'
          type: 'Foreign ID referencing calendar.service_id or ID'
          presence: 'Required'
          description: 'Identifies a set of dates when a service exception occurs for one or more routes. Each (service_id, date) pair may only appear once in calendar_dates.txt if using calendar.txt and calendar_dates.txt in conjunction. If a service_id value appears in both calendar.txt and calendar_dates.txt, the information in calendar_dates.txt modifies the service information specified in calendar.txt.'
        - name: 'date'
          type: 'Date'
          presence: 'Required'
          description: 'Date when service exception occurs.'
        - name: 'exception_type'
          type: 'Enum'
          presence: 'Required'
          description: 'Indicates whether service is available on the date specified in the date field.<hr>*Example:* Suppose a route has one set of trips available on holidays and another set of trips available on all other days. One service_id could correspond to the regular service schedule and another service_id could correspond to the holiday schedule. For a particular holiday, the calendar_dates.txt file could be used to add the holiday to the holiday service_id and to remove the holiday from the regular service_id schedule.'
          options:
            - value: '1'
              description: 'Service has been added for the specified date.'
            - value: '2'
              description: 'Service has been removed for the specified date.'

    - file: 'fare_attributes.txt'
      presence: 'Optional'
      primary_key: 'fare_id'
      notes:
        - 'There are two modeling options for describing fares. GTFS-Fares V1 is the legacy option for describing minimal fare information. GTFS-Fares V2 is an updated method that allows for a more detailed account of an agency''s fare structure. Both are allowed to be present in a dataset, but only one method should be used by a data consumer for a given dataset. GTFS-Fares V2 should take precedence over GTFS-Fares V1.'
        - 'Files associated with GTFS-Fares V1: fare_attributes.txt, fare_rules.txt.'
        - 'Files associated with GTFS-Fares V2: fare_media.txt, fare_products.txt, rider_categories.txt, fare_leg_rules.txt, fare_leg_join_rules.txt, fare_transfer_rules.txt, timeframes.txt, networks.txt, route_networks.txt, areas.txt, stop_areas.txt.'
      fields:
        - name: 'fare_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a fare class.'
        - name: 'price'
          type: 'Non-negative float'
          presence: 'Required'
          description: 'Fare price, in the unit specified by currency_type.'
        - name: 'currency_type'
          type: 'Currency code'
          presence: 'Required'
          description: 'Currency used to pay the fare.'
        - name: 'payment_method'
          type: 'Enum'
          presence: 'Required'
          description: 'Indicates when the fare must be paid.'
          options:
            - value: '0'
              description: 'Fare is paid on board.'
            - value: '1'
              description: 'Fare must be paid before boarding.'
        - name: 'transfers'
          type: 'Enum'
          presence: 'Required'
          description: 'Indicates the number of transfers permitted on this fare.'
          options:
            - value: '0'
              description: 'No transfers permitted on this fare.'
            - value: '1'
              description: 'Riders may transfer once.'
            - value: '2'
              description: 'Riders may transfer twice.'
            - value: 'empty'
              description: 'Unlimited transfers are permitted.'
        - name: 'agency_id'
          type: 'Foreign ID referencing agency.agency_id'
          presence: 'Conditionally Required'
          description: 'Identifies the relevant agency for a fare.'
          conditions:
            - 'Required if multiple agencies are defined in agency.txt.'
            - 'Recommended otherwise.'
        - name: 'transfer_duration'
          type: 'Non-negative integer'
          presence: 'Optional'
          description: 'Length of time in seconds before a transfer expires. When transfers=0 this field may be used to indicate how long a ticket is valid for or it may be left empty.'

    - file: 'fare_rules.txt'
      presence: 'Optional'
      primary_key: '*'
      description: 'Specifies how fares in fare_attributes.txt apply to an itinerary.'
      notes:
        - 'Most fare structures use some combination of rules based on origin or destination stations, zones, or routes.'
        - 'For examples that demonstrate how to specify a fare structure with fare_rules.txt and fare_attributes.txt, see https://web.archive.org/web/20111207224351/https://code.google.com/p/googletransitdatafeed/wiki/FareExamples in the GoogleTransitDataFeed open source project wiki.'
      fields:
        - name: 'fare_id'
          type: 'Foreign ID referencing fare_attributes.fare_id'
          presence: 'Required'
          description: 'Identifies a fare class.'
        - name: 'route_id'
          type: 'Foreign ID referencing routes.route_id'
          presence: 'Optional'
          description: 'Identifies a route associated with the fare class. If several routes with the same fare attributes exist, create a record in fare_rules.txt for each route.<hr>*Example:* If fare class "b" is valid on route "TSW" and "TSE", fare_rules.txt would contain records: fare_id,route_id / b,TSW / b,TSE.'
        - name: 'origin_id'
          type: 'Foreign ID referencing stops.zone_id'
          presence: 'Optional'
          description: 'Identifies an origin zone. If a fare class has multiple origin zones, create a record in fare_rules.txt for each origin_id.<hr>*Example:* If fare class "b" is valid for all travel originating from either zone "2" or zone "8", fare_rules.txt would contain: fare_id,...,origin_id / b,...,2 / b,...,8.'
        - name: 'destination_id'
          type: 'Foreign ID referencing stops.zone_id'
          presence: 'Optional'
          description: 'Identifies a destination zone. If a fare class has multiple destination zones, create a record in fare_rules.txt for each destination_id.<hr>*Example:* The origin_id and destination_id fields can be used together to specify that fare class "b" is valid for travel between zones 3 and 4, and between zones 3 and 5: fare_id,...,origin_id,destination_id / b,...,3,4 / b,...,3,5.'
        - name: 'contains_id'
          type: 'Foreign ID referencing stops.zone_id'
          presence: 'Optional'
          description: 'Identifies the zones that a rider will enter while using a given fare class. Used in some systems to calculate correct fare class.<hr>*Example:* If fare class "c" is associated with all travel on the GRT route that passes through zones 5, 6, and 7, fare_rules.txt would contain records for contains_id 5, 6, and 7. Because all contains_id zones must be matched for the fare to apply, an itinerary that passes through zones 5 and 6 but not zone 7 would not have fare class "c".'

    - file: 'timeframes.txt'
      presence: 'Optional'
      primary_key: '*'
      description: 'Used to describe fares that can vary based on the time of day, the day of the week, or a particular day in the year. Timeframes can be associated with fare products in fare_leg_rules.txt.'
      notes:
        - 'There must not be overlapping time intervals for the same timeframe_group_id and service_id values.'
      fields:
        - name: 'timeframe_group_id'
          type: 'ID'
          presence: 'Required'
          description: 'Identifies a timeframe or set of timeframes.'
        - name: 'start_time'
          type: 'Local time'
          presence: 'Conditionally Required'
          description: 'Defines the beginning of a timeframe. The interval includes the start time. Values greater than 24:00:00 are forbidden. An empty value in start_time is considered 00:00:00.'
          conditions:
            - 'Required if timeframes.end_time is defined.'
            - 'Forbidden otherwise.'
        - name: 'end_time'
          type: 'Local time'
          presence: 'Conditionally Required'
          description: 'Defines the end of a timeframe. The interval does not include the end time. Values greater than 24:00:00 are forbidden. An empty value in end_time is considered 24:00:00.'
          conditions:
            - 'Required if timeframes.start_time is defined.'
            - 'Forbidden otherwise.'
        - name: 'service_id'
          type: 'Foreign ID referencing calendar.service_id or calendar_dates.service_id'
          presence: 'Required'
          description: 'Identifies a set of dates that a timeframe is in effect.'
      explanation:
        title: 'Timeframe Local Time Semantics'
        notes:
          - 'When evaluating a fare event''s time against timeframes.txt, the event time is computed in local time using the local timezone as determined by stop_timezone (if specified) or the feed''s agency timezone.'
          - 'The current day is the current date of the fare event''s time, computed relative to the local timezone; it may differ from the service day of a fare leg''s trip.'
          - 'The time-of-day for the fare event is computed relative to the current day using GTFS Local time field-type semantics.'

    - file: 'rider_categories.txt'
      presence: 'Optional'
      primary_key: 'rider_category_id'
      description: 'Defines categories of riders (e.g. elderly, student).'
      fields:
        - name: 'rider_category_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a rider category.'
        - name: 'rider_category_name'
          type: 'Text'
          presence: 'Required'
          description: 'Rider category name as displayed to the rider.'
        - name: 'is_default_fare_category'
          type: 'Enum'
          presence: 'Required'
          description: 'Specifies if an entry in rider_categories.txt should be considered the default category. When multiple rider categories are eligible for a single fare product specified by a fare_product_id, there must be exactly one eligible rider category indicated as the default rider category (is_default_fare_category=1).'
          options:
            - value: '0 or empty'
              description: 'Category is not considered the default.'
            - value: '1'
              description: 'Category is considered the default one.'
        - name: 'eligibility_url'
          type: 'URL'
          presence: 'Optional'
          description: 'URL of a web page that provides detailed information about a specific rider category and/or describes its eligibility criteria.'

    - file: 'fare_media.txt'
      presence: 'Optional'
      primary_key: 'fare_media_id'
      description: 'Describes the different fare media that can be employed to use fare products. Fare media are physical or virtual holders used for the representation and/or validation of a fare product.'
      fields:
        - name: 'fare_media_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a fare media.'
        - name: 'fare_media_name'
          type: 'Text'
          presence: 'Optional'
          description: 'Name of the fare media. For fare media which are transit cards (fare_media_type=2) or mobile apps (fare_media_type=4), fare_media_name should be included and should match the rider-facing name used by the organizations delivering them.'
        - name: 'fare_media_type'
          type: 'Enum'
          presence: 'Required'
          description: 'The type of fare media.'
          options:
            - value: '0'
              description: 'None. Used when there is no fare media involved in purchasing or validating a fare product, such as paying cash to a driver or conductor with no physical ticket provided.'
            - value: '1'
              description: 'Physical paper ticket that allows a passenger to take either a certain number of pre-purchased trips or unlimited trips within a fixed period of time.'
            - value: '2'
              description: 'Physical transit card that has stored tickets, passes or monetary value.'
            - value: '3'
              description: 'cEMV (contactless Europay, Mastercard and Visa) as an open-loop token container for account-based ticketing.'
            - value: '4'
              description: 'Mobile app that has stored virtual transit cards, tickets, passes, or monetary value.'

    - file: 'fare_products.txt'
      presence: 'Optional'
      primary_key:
        - 'fare_product_id'
        - 'rider_category_id'
        - 'fare_media_id'
      description: 'Describes the range of fares available for purchase by riders or taken into account when computing the total fare for journeys with multiple legs, such as transfer costs.'
      fields:
        - name: 'fare_product_id'
          type: 'ID'
          presence: 'Required'
          description: 'Identifies a fare product or set of fare products. Multiple records sharing the same fare_product_id are permitted as long as they contain different fare_media_id values or rider_category_id values.'
        - name: 'fare_product_name'
          type: 'Text'
          presence: 'Optional'
          description: 'The name of the fare product as displayed to riders.'
        - name: 'rider_category_id'
          type: 'Foreign ID referencing rider_categories.rider_category_id'
          presence: 'Optional'
          description: 'Identifies a rider category eligible for the fare product. If fare_products.rider_category_id is empty, the fare product is eligible for any rider_category_id. When multiple rider categories are eligible for a single fare product specified by a fare_product_id, there must be only one of these rider categories indicated as the default rider category (is_default_fare_category=1).'
        - name: 'fare_media_id'
          type: 'Foreign ID referencing fare_media.fare_media_id'
          presence: 'Optional'
          description: 'Identifies a fare media that can be employed to use the fare product during the trip. When fare_media_id is empty, it is considered that the fare media is unknown.'
        - name: 'amount'
          type: 'Currency amount'
          presence: 'Required'
          description: 'The cost of the fare product. May be negative to represent transfer discounts. May be zero to represent a fare product that is free.'
        - name: 'currency'
          type: 'Currency code'
          presence: 'Required'
          description: 'The currency of the cost of the fare product.'

    - file: 'fare_leg_rules.txt'
      presence: 'Optional'
      primary_key:
        - 'network_id'
        - 'from_area_id'
        - 'to_area_id'
        - 'from_timeframe_group_id'
        - 'to_timeframe_group_id'
        - 'fare_product_id'
      description: 'Fare rules for individual legs of travel.'
      notes:
        - 'Fares in fare_leg_rules.txt must be queried by filtering all the records in the file to find rules that match the leg to be traveled by the rider.'
        - 'To process the cost of a leg, filter by: fare_leg_rules.network_id, fare_leg_rules.from_area_id, fare_leg_rules.to_area_id, fare_leg_rules.from_timeframe_group_id, fare_leg_rules.to_timeframe_group_id.'
        - 'If the leg exactly matches a record based on the characteristics of travel, that record must be processed to determine the cost of the leg.'
        - 'This file handles empty entries in two ways: empty semantics or rule_priority.'
        - 'If no exact matches are found and rule_priority does not exist, empty entries in fare_leg_rules.network_id, fare_leg_rules.from_area_id, and fare_leg_rules.to_area_id must be checked; empty entries correspond to all networks or areas excluding the ones listed under those fields.'
        - 'If rule_priority exists, empty entries in network_id, from_area_id, or to_area_id indicate that the field does not affect the matching of the rule.'
        - 'If the leg does not match any of the rules described above, then the fare is unknown.'
      fields:
        - name: 'leg_group_id'
          type: 'ID'
          presence: 'Optional'
          description: 'Identifies a group of entries in fare_leg_rules.txt. Used to describe fare transfer rules between fare_transfer_rules.from_leg_group_id and fare_transfer_rules.to_leg_group_id. Multiple entries may belong to the same leg_group_id. The same entry (not including leg_group_id) must not belong to multiple leg_group_id values.'
        - name: 'network_id'
          type: 'Foreign ID referencing routes.network_id or networks.network_id'
          presence: 'Optional'
          description: 'Identifies a route network that applies for the fare leg rule. If rule_priority does not exist and there are no matching network_id values, empty network_id entries will be matched by default and correspond to all networks defined in routes.txt or networks.txt excluding the ones listed under fare_leg_rules.network_id. If rule_priority exists, an empty network_id indicates the route network of the leg does not affect the matching of this rule. When matching against an effective fare leg of multiple legs, each leg must have the same network_id.'
        - name: 'from_area_id'
          type: 'Foreign ID referencing areas.area_id'
          presence: 'Optional'
          description: 'Identifies a departure area. If rule_priority does not exist and there are no matching from_area_id values, empty from_area_id entries will be matched by default and correspond to all areas defined in areas.area_id excluding the ones listed under fare_leg_rules.from_area_id. If rule_priority exists, an empty from_area_id indicates the departure area does not affect the matching of this rule. When matching against an effective fare leg of multiple legs, the first leg is used for determining the departure area.'
        - name: 'to_area_id'
          type: 'Foreign ID referencing areas.area_id'
          presence: 'Optional'
          description: 'Identifies an arrival area. If rule_priority does not exist and there are no matching to_area_id values, empty to_area_id entries will be matched by default and correspond to all areas defined in areas.area_id excluding the ones listed under fare_leg_rules.to_area_id. If rule_priority exists, an empty to_area_id indicates the arrival area does not affect the matching of this rule. When matching against an effective fare leg of multiple legs, the last leg is used for determining the arrival area.'
        - name: 'from_timeframe_group_id'
          type: 'Foreign ID referencing timeframes.timeframe_group_id'
          presence: 'Optional'
          description: 'Defines the timeframe for the fare validation event at the start of the fare leg. The start time is computed in local time as determined by the Local Time Semantics of timeframes.txt, using the stop or station of the fare leg''s departure event for timezone resolution when appropriate. For a fare leg rule that specifies a from_timeframe_group_id, the rule matches a leg if there exists a record in timeframes.txt where: (1) timeframe_group_id equals from_timeframe_group_id, (2) the set of days identified by service_id contains the current day of the fare leg''s start time, and (3) the time-of-day of the fare leg''s start time is greater than or equal to timeframes.start_time and less than timeframes.end_time. An empty from_timeframe_group_id indicates that the start time of the leg does not affect the matching of this rule. When matching against an effective fare leg of multiple legs, the first leg is used for determining the starting fare validation event.'
        - name: 'to_timeframe_group_id'
          type: 'Foreign ID referencing timeframes.timeframe_group_id'
          presence: 'Optional'
          description: 'Defines the timeframe for the fare validation event at the end of the fare leg. The end time is computed in local time as determined by the Local Time Semantics of timeframes.txt, using the stop or station of the fare leg''s arrival event for timezone resolution when appropriate. For a fare leg rule that specifies a to_timeframe_group_id, the rule matches a leg if there exists a record in timeframes.txt where: (1) timeframe_group_id equals to_timeframe_group_id, (2) the set of days identified by service_id contains the current day of the fare leg''s end time, and (3) the time-of-day of the fare leg''s end time is greater than or equal to timeframes.start_time and less than timeframes.end_time. An empty to_timeframe_group_id indicates that the end time of the leg does not affect the matching of this rule. When matching against an effective fare leg of multiple legs, the last leg is used for determining the ending fare validation event.'
        - name: 'fare_product_id'
          type: 'Foreign ID referencing fare_products.fare_product_id'
          presence: 'Required'
          description: 'The fare product required to travel the leg.'
        - name: 'rule_priority'
          type: 'Non-negative integer'
          presence: 'Optional'
          description: 'Defines the order of priority in which matching rules are applied to legs, allowing certain rules to take precedence over others. When multiple entries match, the rule or set of rules with the highest value for rule_priority will be selected. An empty value for rule_priority is treated as zero.'

    - file: 'fare_leg_join_rules.txt'
      presence: 'Optional'
      primary_key:
        - 'from_network_id'
        - 'to_network_id'
        - 'from_stop_id'
        - 'to_stop_id'
      notes:
        - 'For a sub-journey of two consecutive legs with a transfer, if the transfer matches all matching predicates specified by a particular record in the file, then those two legs should be considered as a single effective fare leg for the purposes of matching against rules in fare_leg_rules.txt.'
        - 'Unless overridden explicitly by from_stop_id and to_stop_id, the last station of the pre-transfer leg and the first station of the post-transfer leg must be the same for the record.'
        - 'If a matching predicate field value is blank or unspecified for a particular record in the file, then that field should be ignored for the purposes of matching.'
        - 'When a sub-journey contains consecutive transfers that each match a join rule, then the entire sub-journey should be considered as a single effective fare leg.'
      fields:
        - name: 'from_network_id'
          type: 'Foreign ID referencing routes.network_id or networks.network_id'
          presence: 'Required'
          description: 'Matches a pre-transfer leg that uses the specified route network. If specified, the same to_network_id must also be specified.'
        - name: 'to_network_id'
          type: 'Foreign ID referencing routes.network_id or networks.network_id'
          presence: 'Required'
          description: 'Matches a post-transfer leg that uses the specified route network. If specified, the same from_network_id must also be specified.'
        - name: 'from_stop_id'
          type: 'Foreign ID referencing stops.stop_id'
          presence: 'Conditionally Required'
          description: 'Matches a pre-transfer leg that ends at the specified stop (location_type=0 or empty) or station (location_type=1).'
          conditions:
            - 'Required if to_stop_id is defined.'
            - 'Optional otherwise.'
        - name: 'to_stop_id'
          type: 'Foreign ID referencing stops.stop_id'
          presence: 'Conditionally Required'
          description: 'Matches a post-transfer leg that starts at the specified stop (location_type=0 or empty) or station (location_type=1).'
          conditions:
            - 'Required if from_stop_id is defined.'
            - 'Optional otherwise.'

    - file: 'fare_transfer_rules.txt'
      presence: 'Optional'
      primary_key:
        - 'from_leg_group_id'
        - 'to_leg_group_id'
        - 'fare_product_id'
        - 'transfer_count'
        - 'duration_limit'
      description: 'Fare rules for transfers between legs of travel defined in fare_leg_rules.txt.'
      notes:
        - 'To process the cost of a multi-leg journey, determine applicable fare leg groups defined in fare_leg_rules.txt for all individual legs or effective fare legs, then filter fare_transfer_rules.txt by from_leg_group_id and to_leg_group_id.'
        - 'If the transfer exactly matches a record based on the characteristics of the transfer, that record must be processed to determine the transfer cost.'
        - 'If no exact matches are found, empty entries in from_leg_group_id or to_leg_group_id must be checked; empty entries correspond to all leg groups excluding the ones listed under those fields.'
        - 'If the transfer does not match any of the rules described above, then there is no transfer arrangement and the legs are considered separate.'
        - 'Cost processing interactions between multiple transfers in a journey: fare_transfer_type 0 => A + AB then S + BC; fare_transfer_type 1 => A + AB + B then S + BC + C; fare_transfer_type 2 => AB then S + BC; where S indicates the total processed cost of the preceding leg(s) and transfer(s).'
      fields:
        - name: 'from_leg_group_id'
          type: 'Foreign ID referencing fare_leg_rules.leg_group_id'
          presence: 'Optional'
          description: 'Identifies a group of pre-transfer fare leg rules. If there are no matching from_leg_group_id values to the leg_group_id being filtered, empty from_leg_group_id entries will be matched by default and correspond to all leg groups defined under fare_leg_rules.leg_group_id excluding the ones listed under fare_transfer_rules.from_leg_group_id.'
        - name: 'to_leg_group_id'
          type: 'Foreign ID referencing fare_leg_rules.leg_group_id'
          presence: 'Optional'
          description: 'Identifies a group of post-transfer fare leg rules. If there are no matching to_leg_group_id values to the leg_group_id being filtered, empty to_leg_group_id entries will be matched by default and correspond to all leg groups defined under fare_leg_rules.leg_group_id excluding the ones listed under fare_transfer_rules.to_leg_group_id.'
        - name: 'transfer_count'
          type: 'Non-zero integer'
          presence: 'Conditionally Forbidden'
          description: 'Defines how many consecutive transfers the transfer rule may be applied to. Valid options are -1 (no limit) or 1 or more (defines how many transfers the rule may span). If a sub-journey matches multiple records with different transfer_count values, the rule with the minimum transfer_count that is greater than or equal to the current transfer count of the sub-journey is selected.'
          conditions:
            - 'Forbidden if fare_transfer_rules.from_leg_group_id does not equal fare_transfer_rules.to_leg_group_id.'
            - 'Required if fare_transfer_rules.from_leg_group_id equals fare_transfer_rules.to_leg_group_id.'
        - name: 'duration_limit'
          type: 'Positive integer'
          presence: 'Optional'
          description: 'Defines the duration limit of the transfer, expressed in integer increments of seconds. If there is no duration limit, duration_limit must be empty.'
        - name: 'duration_limit_type'
          type: 'Enum'
          presence: 'Conditionally Required'
          description: 'Defines the relative start and end of duration_limit. When a transfer rule with the same from_leg_group_id and to_leg_group_id is matched multiple times consecutively within a multi-leg journey, the duration_limit specified by the rule should be measured starting from the first matched leg.'
          options:
            - value: '0'
              description: 'Between the departure fare validation of the first leg in transfer sub-journey and the arrival fare validation of the last leg in transfer sub-journey.'
            - value: '1'
              description: 'Between the departure fare validation of the first leg in transfer sub-journey and the departure fare validation of the last leg in transfer sub-journey.'
            - value: '2'
              description: 'Between the arrival fare validation of the first leg in transfer sub-journey and the departure fare validation of the last leg in transfer sub-journey.'
            - value: '3'
              description: 'Between the arrival fare validation of the first leg in transfer sub-journey and the arrival fare validation of the last leg in transfer sub-journey.'
          conditions:
            - 'Required if fare_transfer_rules.duration_limit is defined.'
            - 'Forbidden if fare_transfer_rules.duration_limit is empty.'
        - name: 'fare_transfer_type'
          type: 'Enum'
          presence: 'Required'
          description: 'Indicates the cost processing method of transferring between legs in a journey.'
          options:
            - value: '0'
              description: 'From-leg fare_leg_rules.fare_product_id plus fare_transfer_rules.fare_product_id; A + AB.'
            - value: '1'
              description: 'From-leg fare_leg_rules.fare_product_id plus fare_transfer_rules.fare_product_id plus to-leg fare_leg_rules.fare_product_id; A + AB + B.'
            - value: '2'
              description: 'fare_transfer_rules.fare_product_id; AB.'
        - name: 'fare_product_id'
          type: 'Foreign ID referencing fare_products.fare_product_id'
          presence: 'Optional'
          description: 'The fare product required to transfer between two fare legs. If empty, the cost of the transfer rule is 0.'

    - file: 'areas.txt'
      presence: 'Optional'
      primary_key: 'area_id'
      description: 'Defines area identifiers.'
      fields:
        - name: 'area_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies an area. Must be unique in areas.txt.'
        - name: 'area_name'
          type: 'Text'
          presence: 'Optional'
          description: 'The name of the area as displayed to the rider.'

    - file: 'stop_areas.txt'
      presence: 'Optional'
      primary_key: '*'
      description: 'Assigns stops from stops.txt to areas.'
      fields:
        - name: 'area_id'
          type: 'Foreign ID referencing areas.area_id'
          presence: 'Required'
          description: 'Identifies an area to which one or multiple stop_id values belong. The same stop_id may be defined in many area_id values.'
        - name: 'stop_id'
          type: 'Foreign ID referencing stops.stop_id'
          presence: 'Required'
          description: 'Identifies a stop. If a station (location_type=1) is defined in this field, all of its platforms are part of the same area unless platforms are assigned to other areas.'

    - file: 'networks.txt'
      presence: 'Conditionally Forbidden'
      primary_key: 'network_id'
      description: 'Defines network identifiers that apply for fare leg rules.'
      fields:
        - name: 'network_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a network. Must be unique in networks.txt.'
        - name: 'network_name'
          type: 'Text'
          presence: 'Optional'
          description: 'The name of the network that applies for fare leg rules, as used by the local agency and its riders.'

    - file: 'route_networks.txt'
      presence: 'Conditionally Forbidden'
      primary_key: 'route_id'
      description: 'Assigns routes from routes.txt to networks.'
      fields:
        - name: 'network_id'
          type: 'Foreign ID referencing networks.network_id'
          presence: 'Required'
          description: 'Identifies a network to which one or multiple route_id values belong. A route_id can only be defined in one network_id.'
        - name: 'route_id'
          type: 'Foreign ID referencing routes.route_id'
          presence: 'Required'
          description: 'Identifies a route.'

    - file: 'frequencies.txt'
      presence: 'Optional'
      primary_key:
        - 'trip_id'
        - 'start_time'
      description: 'Represents trips that operate on regular headways (time between trips).' 
      notes:
        - 'Frequency-based service (exact_times=0) in which service does not follow a fixed schedule throughout the day. Operators attempt to strictly maintain predetermined headways for trips.'
        - 'A compressed representation of schedule-based service (exact_times=1) that has the exact same headway for trips over specified time periods. Operators try to strictly adhere to a schedule.'
      fields:
        - name: 'trip_id'
          type: 'Foreign ID referencing trips.trip_id'
          presence: 'Required'
          description: 'Identifies a trip to which the specified headway of service applies.'
        - name: 'start_time'
          type: 'Time'
          presence: 'Required'
          description: 'Time at which the first vehicle departs from the first stop of the trip with the specified headway.'
        - name: 'end_time'
          type: 'Time'
          presence: 'Required'
          description: 'Time at which service changes to a different headway (or ceases) at the first stop in the trip.'
        - name: 'headway_secs'
          type: 'Positive integer'
          presence: 'Required'
          description: 'Time, in seconds, between departures from the same stop for the trip, during the time interval specified by start_time and end_time. Multiple headways may be defined for the same trip, but must not overlap. New headways may start at the exact time the previous headway ends.'
        - name: 'exact_times'
          type: 'Enum'
          presence: 'Optional'
          description: 'Indicates the type of service for a trip.'
          options:
            - value: '0 or empty'
              description: 'Frequency-based trips.'
            - value: '1'
              description: 'Schedule-based trips with the exact same headway throughout the day. end_time must be greater than the last desired trip start_time but less than the last desired trip start_time + headway_secs.'

    - file: 'transfers.txt'
      presence: 'Optional'
      primary_key:
        - 'from_stop_id'
        - 'to_stop_id'
        - 'from_trip_id'
        - 'to_trip_id'
        - 'from_route_id'
        - 'to_route_id'
      description: 'Specifies additional rules and overrides for selected transfers. When calculating an itinerary, GTFS-consuming applications interpolate transfers based on allowable time and stop proximity.'
      fields:
        - name: 'from_stop_id'
          type: 'Foreign ID referencing stops.stop_id'
          presence: 'Conditionally Required'
          description: 'Identifies a stop (location_type=0) or a station (location_type=1) where a connection between routes begins. If this field refers to a station, the transfer rule applies to all its child stops. It must refer to a stop (location_type=0) if transfer_type is 4 or 5.'
          conditions:
            - 'Required if transfer_type is 1, 2, or 3.'
            - 'Optional if transfer_type is 4 or 5.'
        - name: 'to_stop_id'
          type: 'Foreign ID referencing stops.stop_id'
          presence: 'Conditionally Required'
          description: 'Identifies a stop (location_type=0) or a station (location_type=1) where a connection between routes ends. If this field refers to a station, the transfer rule applies to all its child stops. It must refer to a stop (location_type=0) if transfer_type is 4 or 5.'
          conditions:
            - 'Required if transfer_type is 1, 2, or 3.'
            - 'Optional if transfer_type is 4 or 5.'
        - name: 'from_route_id'
          type: 'Foreign ID referencing routes.route_id'
          presence: 'Optional'
          description: 'Identifies a route where a connection begins. If from_route_id is defined, the transfer will apply to the arriving trip on the route for the given from_stop_id. If both from_trip_id and from_route_id are defined, the trip_id must belong to the route_id, and from_trip_id will take precedence.'
        - name: 'to_route_id'
          type: 'Foreign ID referencing routes.route_id'
          presence: 'Optional'
          description: 'Identifies a route where a connection ends. If to_route_id is defined, the transfer will apply to the departing trip on the route for the given to_stop_id. If both to_trip_id and to_route_id are defined, the trip_id must belong to the route_id, and to_trip_id will take precedence.'
        - name: 'from_trip_id'
          type: 'Foreign ID referencing trips.trip_id'
          presence: 'Conditionally Required'
          description: 'Identifies a trip where a connection between routes begins. If from_trip_id is defined, the transfer will apply to the arriving trip for the given from_stop_id. If both from_trip_id and from_route_id are defined, the trip_id must belong to the route_id, and from_trip_id will take precedence.'
          conditions:
            - 'Required if transfer_type is 4 or 5.'
            - 'Optional otherwise.'
        - name: 'to_trip_id'
          type: 'Foreign ID referencing trips.trip_id'
          presence: 'Conditionally Required'
          description: 'Identifies a trip where a connection between routes ends. If to_trip_id is defined, the transfer will apply to the departing trip for the given to_stop_id. If both to_trip_id and to_route_id are defined, the trip_id must belong to the route_id, and to_trip_id will take precedence.'
          conditions:
            - 'Required if transfer_type is 4 or 5.'
            - 'Optional otherwise.'
        - name: 'transfer_type'
          type: 'Enum'
          presence: 'Required'
          description: 'Indicates the type of connection for the specified (from_stop_id, to_stop_id) pair.'
          options:
            - value: '0 or empty'
              description: 'Recommended transfer point between routes.'
            - value: '1'
              description: 'Timed transfer point between two routes.'
            - value: '2'
              description: 'Transfer requires a minimum amount of time between arrival and departure to ensure a connection. The time required to transfer is specified by min_transfer_time.'
            - value: '3'
              description: 'Transfers are not possible between routes at the location.'
            - value: '4'
              description: 'Passengers can transfer from one trip to another by staying onboard the same vehicle (in-seat transfer).'
            - value: '5'
              description: 'In-seat transfers are not allowed between sequential trips. The passenger must alight from the vehicle and re-board.'
        - name: 'min_transfer_time'
          type: 'Non-negative integer'
          presence: 'Optional'
          description: 'Amount of time, in seconds, that must be available to permit a transfer between routes at the specified stops.'
      explanation:
        title: 'Linked trips'
        notes:
          - 'Fields from_trip_id, to_trip_id, from_route_id and to_route_id allow higher orders of specificity for transfer rules. The ranking of specificity is: (1) both trip_id values, (2) one trip_id and the opposite route_id, (3) one trip_id, (4) both route_id values, (5) one route_id, (6) only from_stop_id and to_stop_id.'
          - 'For a given ordered pair of arriving and departing trips, the transfer with the greatest specificity that applies between these two trips is chosen. There should not be two transfers with equally maximal specificity that could apply.'
          - 'Linked trips apply to transfer_type=4 and transfer_type=5. Trips linked together must be operated by the same vehicle. The vehicle may be coupled to, or uncoupled from, other vehicles. If both a linked trips transfer and a block_id are provided and they produce conflicting results, the linked trips transfer is used.'
          - 'The last stop of from_trip_id should be geographically close to the first stop of to_trip_id, and the last arrival time of from_trip_id should be prior but close to the first departure time of to_trip_id. The last arrival time of from_trip_id may be later than the first departure time of to_trip_id if the to_trip_id trip is occurring the subsequent service day.'
          - 'Trips may be linked 1-to-1, 1-to-n, n-to-1, or n-to-n to represent more complex trip continuations.'
          - 'Example: Two train trips (A and B) can merge into a single train trip (C) after a vehicle coupling operation at a common station.'
          - 'In a 1-to-n continuation, trips.service_id for each to_trip_id must be identical. In an n-to-1 continuation, trips.service_id for each from_trip_id must be identical. n-to-n continuations must respect both constraints.'
          - 'Trips may be linked together as part of multiple distinct continuations, provided that trip.service_id values must not overlap on any day of service.'

    - file: 'pathways.txt'
      presence: 'Optional'
      primary_key: 'pathway_id'
      description: 'Describes pathways that link together locations within stations.'
      notes:
        - 'pathways.txt and levels.txt use a graph representation to describe stations, with nodes representing locations and edges representing pathways. Generic nodes (location_type=3) can be used to connect pathways throughout a station.'
        - 'Pathways are intended to exhaustively define the internal access graph of a station. If any pathways are defined within a station, data consumers should assume that all relevant connections within that station are described. The optional stop_access field in stops.txt may be used to define whether a stop is accessible directly from the street network or through the station''s defined pathways.'
        - 'No dangling locations: If any location within a station has a pathway, then all locations within that station should have pathways, except platforms that have boarding areas, and stops with stops.stop_access=1.'
        - 'No pathways for a platform with boarding areas: A platform with boarding areas is treated as a parent object and must not have pathways assigned; pathways should be assigned to boarding areas instead.'
        - 'No locked platforms: If any location within a station has a pathway, each platform or boarding area must be connected to at least one entrance/exit via a chain of pathways, unless the stop is marked with stops.stop_access=1.'
      fields:
        - name: 'pathway_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a pathway. Must be unique in the dataset. Different pathways may have the same from_stop_id and to_stop_id values. Example: Two escalators side-by-side in opposite directions, or a stair set and elevator going from the same place to the same place.'
        - name: 'from_stop_id'
          type: 'Foreign ID referencing stops.stop_id'
          presence: 'Required'
          description: 'Location at which the pathway begins. Must identify a platform (location_type=0 or empty), entrance/exit (location_type=2), generic node (location_type=3) or boarding area (location_type=4). Values that identify stations (location_type=1), or stops with stop_access=1, are forbidden.'
        - name: 'to_stop_id'
          type: 'Foreign ID referencing stops.stop_id'
          presence: 'Required'
          description: 'Location at which the pathway ends. Must identify a platform (location_type=0 or empty), entrance/exit (location_type=2), generic node (location_type=3) or boarding area (location_type=4). Values that identify stations (location_type=1), or stops with stop_access=1, are forbidden.'
        - name: 'pathway_mode'
          type: 'Enum'
          presence: 'Required'
          description: 'Type of pathway between the specified (from_stop_id, to_stop_id) pair.'
          options:
            - value: '1'
              description: 'Walkway.'
            - value: '2'
              description: 'Stairs.'
            - value: '3'
              description: 'Moving sidewalk/travelator.'
            - value: '4'
              description: 'Escalator.'
            - value: '5'
              description: 'Elevator.'
            - value: '6'
              description: 'Fare gate (or payment gate): A pathway that crosses into an area of the station where proof of payment is required. Fare gates may separate paid areas of the station from unpaid ones, or separate different payment areas within the same station from each other.'
            - value: '7'
              description: 'Exit gate: A pathway exiting a paid area into an unpaid area where proof of payment is not required to cross.'
        - name: 'is_bidirectional'
          type: 'Enum'
          presence: 'Required'
          description: 'Indicates the direction that the pathway can be taken.'
          options:
            - value: '0'
              description: 'Unidirectional pathway that can only be used from from_stop_id to to_stop_id.'
            - value: '1'
              description: 'Bidirectional pathway that can be used in both directions. Exit gates (pathway_mode=7) must not be bidirectional.'
        - name: 'length'
          type: 'Non-negative float'
          presence: 'Optional'
          description: 'Horizontal length in meters of the pathway from the origin location to the destination location. Recommended for walkways (pathway_mode=1), fare gates (pathway_mode=6) and exit gates (pathway_mode=7).'
        - name: 'traversal_time'
          type: 'Positive integer'
          presence: 'Optional'
          description: 'Average time in seconds needed to walk through the pathway from the origin location to the destination location. Recommended for moving sidewalks (pathway_mode=3), escalators (pathway_mode=4) and elevators (pathway_mode=5).'
        - name: 'stair_count'
          type: 'Non-null integer'
          presence: 'Optional'
          description: 'Number of stairs of the pathway. A positive value implies walking up; a negative value implies walking down. Recommended for stairs (pathway_mode=2). If only an estimated stair count can be provided, approximate 15 stairs for 1 floor.'
        - name: 'max_slope'
          type: 'Float'
          presence: 'Optional'
          description: 'Maximum slope ratio of the pathway. Valid options are 0 or empty for no slope, or a float ratio (positive for upwards, negative for downwards). Should only be used with walkways (pathway_mode=1) and moving sidewalks (pathway_mode=3). Example: 0.083 (8.3%) is the maximum slope ratio for hand-propelled wheelchairs in the US.'
        - name: 'min_width'
          type: 'Positive float'
          presence: 'Optional'
          description: 'Minimum width of the pathway in meters. Recommended if the minimum width is less than 1 meter.'
        - name: 'signposted_as'
          type: 'Text'
          presence: 'Optional'
          description: 'Public facing text from physical signage that is visible to riders. The text should appear exactly how it is printed on the signs. May be used to provide text directions to riders, such as "follow signs to". When the physical signage is multilingual, this field may be populated and translated following the example of stops.stop_name in feed_info.feed_lang.'
        - name: 'reversed_signposted_as'
          type: 'Text'
          presence: 'Optional'
          description: 'Same as signposted_as, but when the pathway is used from the to_stop_id to the from_stop_id.'

    - file: 'levels.txt'
      presence: 'Conditionally Required'
      primary_key: 'level_id'
      description: 'Describes levels in a station.'
      fields:
        - name: 'level_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a level in a station.'
        - name: 'level_index'
          type: 'Float'
          presence: 'Required'
          description: 'Numeric index of the level that indicates its relative position. Ground level should have index 0, with levels above ground indicated by positive indices and levels below ground by negative indices.'
        - name: 'level_name'
          type: 'Text'
          presence: 'Optional'
          description: 'Name of the level as seen by the rider inside the building or station. Example: Take the elevator to "Mezzanine" or "Platform" or "-1".'

    - file: 'location_groups.txt'
      presence: 'Optional'
      primary_key: 'location_group_id'
      description: 'Defines location groups, which are groups of stops where a rider may request pickup or drop off.'
      fields:
        - name: 'location_group_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a location group. ID must be unique across all stops.stop_id, locations.geojson id, and location_groups.location_group_id values.'
        - name: 'location_group_name'
          type: 'Text'
          presence: 'Optional'
          description: 'The name of the location group as displayed to the rider.'

    - file: 'location_group_stops.txt'
      presence: 'Optional'
      primary_key: '*'
      description: 'Assigns stops from stops.txt to location groups.'
      fields:
        - name: 'location_group_id'
          type: 'Foreign ID referencing location_groups.location_group_id'
          presence: 'Required'
          description: 'Identifies a location group to which one or multiple stop_id values belong. The same stop_id may be defined in many location_group_id values.'
        - name: 'stop_id'
          type: 'Foreign ID referencing stops.stop_id'
          presence: 'Required'
          description: 'Identifies a stop belonging to the location group.'

    - file: 'locations.geojson'
      presence: 'Optional'
      primary_key: 'id'
      description: 'Defines zones where riders can request either pickup or drop off by on-demand services. These zones are represented as GeoJSON polygons.'
      notes:
        - 'This file uses a subset of the GeoJSON format described in RFC 7946.'
        - 'Each polygon must be valid by the definition of the OpenGIS Simple Features Specification, section 6.1.11.'
        - 'The locations.geojson file must contain a FeatureCollection.'
        - 'A FeatureCollection defines various stop locations where riders may request pickup or drop off.'
        - 'Every GeoJSON Feature must have an id. The id must be unique across all stops.stop_id, locations.geojson id, and location_group_id values.'
        - 'Every GeoJSON Feature should have objects and associated keys according to the fields defined below.'
      fields:
        - name: 'type'
          type: 'String'
          presence: 'Required'
          description: '"FeatureCollection" of locations.'
        - name: 'features'
          type: 'Array'
          presence: 'Required'
          description: 'Collection of "Feature" objects describing the locations.'
          children:
            - name: 'type'
              type: 'String'
              presence: 'Required'
              description: '"Feature".'
            - name: 'id'
              type: 'String'
              presence: 'Required'
              description: 'Identifies a location. ID must be unique across all stops.stop_id, locations.geojson id, and location_groups.location_group_id values.'
            - name: 'properties'
              type: 'Object'
              presence: 'Required'
              description: 'Location property keys.'
              children:
                - name: 'stop_name'
                  type: 'String'
                  presence: 'Optional'
                  description: 'Indicates the name of the location as displayed to riders.'
                - name: 'stop_desc'
                  type: 'String'
                  presence: 'Optional'
                  description: 'Meaningful description of the location to help orient riders.'
            - name: 'geometry'
              type: 'Object'
              presence: 'Required'
              description: 'Geometry of the location.'
              children:
                - name: 'type'
                  type: 'String'
                  presence: 'Required'
                  description: 'Must be of type "Polygon" or "MultiPolygon".'
                - name: 'coordinates'
                  type: 'Array'
                  presence: 'Required'
                  description: 'Geographic coordinates (latitude and longitude) defining the geometry of the location.'

    - file: 'booking_rules.txt'
      presence: 'Optional'
      primary_key: 'booking_rule_id'
      description: 'Defines the booking rules for rider-requested services.'
      fields:
        - name: 'booking_rule_id'
          type: 'Unique ID'
          presence: 'Required'
          description: 'Identifies a rule.'
        - name: 'booking_type'
          type: 'Enum'
          presence: 'Required'
          description: 'Indicates how far in advance booking can be made.'
          options:
            - value: '0'
              description: 'Real time booking.'
            - value: '1'
              description: 'Up to same-day booking with advance notice.'
            - value: '2'
              description: 'Up to prior day(s) booking.'
        - name: 'prior_notice_duration_min'
          type: 'Integer'
          presence: 'Conditionally Required'
          description: 'Minimum number of minutes before travel to make the request.'
          conditions:
            - 'Required for booking_type=1.'
            - 'Forbidden otherwise.'
        - name: 'prior_notice_duration_max'
          type: 'Integer'
          presence: 'Conditionally Forbidden'
          description: 'Maximum number of minutes before travel to make the booking request.'
          conditions:
            - 'Forbidden for booking_type=0 and booking_type=2.'
            - 'Optional for booking_type=1.'
        - name: 'prior_notice_last_day'
          type: 'Integer'
          presence: 'Conditionally Required'
          description: 'Last day before travel to make the booking request. Example: Ride must be booked 1 day in advance before 5PM will be encoded as prior_notice_last_day=1.'
          conditions:
            - 'Required for booking_type=2.'
            - 'Forbidden otherwise.'
        - name: 'prior_notice_last_time'
          type: 'Time'
          presence: 'Conditionally Required'
          description: 'Last time on the last day before travel to make the booking request. Example: Ride must be booked 1 day in advance before 5PM will be encoded as prior_notice_last_time=17:00:00.'
          conditions:
            - 'Required if prior_notice_last_day is defined.'
            - 'Forbidden otherwise.'
        - name: 'prior_notice_start_day'
          type: 'Integer'
          presence: 'Conditionally Forbidden'
          description: 'Earliest day before travel to make the booking request. Example: Ride can be booked at the earliest one week in advance at midnight will be encoded as prior_notice_start_day=7.'
          conditions:
            - 'Forbidden for booking_type=0.'
            - 'Forbidden for booking_type=1 if prior_notice_duration_max is defined.'
            - 'Optional otherwise.'
        - name: 'prior_notice_start_time'
          type: 'Time'
          presence: 'Conditionally Required'
          description: 'Earliest time on the earliest day before travel to make the booking request. Example: Ride can be booked at the earliest one week in advance at midnight will be encoded as prior_notice_start_time=00:00:00.'
          conditions:
            - 'Required if prior_notice_start_day is defined.'
            - 'Forbidden otherwise.'
        - name: 'prior_notice_service_id'
          type: 'Foreign ID referencing calendar.service_id'
          presence: 'Conditionally Forbidden'
          description: 'Indicates the service days on which prior_notice_last_day or prior_notice_start_day are counted. Example: If empty, prior_notice_start_day=2 will be two calendar days in advance. If defined as a service_id containing only business days, prior_notice_start_day=2 will be two business days in advance.'
          conditions:
            - 'Optional if booking_type=2.'
            - 'Forbidden otherwise.'
        - name: 'message'
          type: 'Text'
          presence: 'Optional'
          description: 'Message to riders utilizing service at a stop_time when booking on-demand pickup and drop off.'
        - name: 'pickup_message'
          type: 'Text'
          presence: 'Optional'
          description: 'Functions in the same way as message but used when riders have on-demand pickup only.'
        - name: 'drop_off_message'
          type: 'Text'
          presence: 'Optional'
          description: 'Functions in the same way as message but used when riders have on-demand drop off only.'
        - name: 'phone_number'
          type: 'Phone number'
          presence: 'Optional'
          description: 'Phone number to call to make the booking request.'
        - name: 'info_url'
          type: 'URL'
          presence: 'Optional'
          description: 'URL providing information about the booking rule.'
        - name: 'booking_url'
          type: 'URL'
          presence: 'Optional'
          description: 'URL to an online interface or app where the booking request can be made.'

    - file: 'translations.txt'
      presence: 'Optional'
      primary_key:
        - 'table_name'
        - 'field_name'
        - 'language'
        - 'record_id'
        - 'record_sub_id'
        - 'field_value'
      description: 'Translations of customer-facing dataset values.'
      notes:
        - 'If both referencing methods (record_id, record_sub_id) and field_value are used to translate the same value in two different rows, the translation provided with record_id and record_sub_id takes precedence.'
        - 'Fields in tables not defined above should not be translated. However, producers sometimes add extra fields outside the official specification, and these unofficial fields may be translated using the recommended record_id and record_sub_id mappings.'
        - 'record_id mapping for tables with defined primary keys: agency_id for agency.txt; stop_id for stops.txt; route_id for routes.txt; trip_id for trips.txt; trip_id for stop_times.txt; pathway_id for pathways.txt; level_id for levels.txt; attribution_id for attributions.txt.'
        - 'record_id recommended for tables not defined above: service_id for calendar.txt; service_id for calendar_dates.txt; fare_id for fare_attributes.txt; fare_id for fare_rules.txt; shape_id for shapes.txt; trip_id for frequencies.txt; from_stop_id for transfers.txt.'
        - 'record_sub_id mapping for tables with defined primary keys: none for agency.txt, stops.txt, routes.txt, trips.txt, pathways.txt, levels.txt, attributions.txt; stop_sequence for stop_times.txt.'
        - 'record_sub_id recommended for tables not defined above: none for calendar.txt; date for calendar_dates.txt; none for fare_attributes.txt; route_id for fare_rules.txt; none for shapes.txt; start_time for frequencies.txt; to_stop_id for transfers.txt.'
      fields:
        - name: 'table_name'
          type: 'Enum'
          presence: 'Required'
          description: 'Defines the table that contains the field to be translated. Any file added to GTFS will have a table_name value equivalent to the file name, not including the .txt file extension.'
          options:
            - value: 'agency'
              description: 'agency.txt.'
            - value: 'stops'
              description: 'stops.txt.'
            - value: 'routes'
              description: 'routes.txt.'
            - value: 'trips'
              description: 'trips.txt.'
            - value: 'stop_times'
              description: 'stop_times.txt.'
            - value: 'pathways'
              description: 'pathways.txt.'
            - value: 'levels'
              description: 'levels.txt.'
            - value: 'feed_info'
              description: 'feed_info.txt.'
            - value: 'attributions'
              description: 'attributions.txt.'
        - name: 'field_name'
          type: 'Text'
          presence: 'Required'
          description: 'Name of the field to be translated. Fields with type Text may be translated; URL, Email, and Phone number may be translated to provide resources in the correct language. Other types should not be translated.'
        - name: 'language'
          type: 'Language code'
          presence: 'Required'
          description: 'Language of translation. If the language is the same as in feed_info.feed_lang, the original value of the field is assumed to be the default value to use in languages without specific translations (if default_lang does not specify otherwise).'
        - name: 'translation'
          type: 'Text or URL or Email or Phone number'
          presence: 'Required'
          description: 'Translated value.'
        - name: 'record_id'
          type: 'Foreign ID'
          presence: 'Conditionally Required'
          description: 'Defines the record that corresponds to the field to be translated. The value must be the first or only field of a table''s primary key as defined in the reference.'
          conditions:
            - 'Forbidden if table_name is feed_info.'
            - 'Forbidden if field_value is defined.'
            - 'Required if field_value is empty.'
        - name: 'record_sub_id'
          type: 'Foreign ID'
          presence: 'Conditionally Required'
          description: 'Secondary ID of the table when the table does not have a unique ID, as defined in the reference.'
          conditions:
            - 'Forbidden if table_name is feed_info.'
            - 'Forbidden if field_value is defined.'
            - 'Required if table_name=stop_times and record_id is defined.'
        - name: 'field_value'
          type: 'Text or URL or Email or Phone number'
          presence: 'Conditionally Required'
          description: 'Defines the value which should be translated instead of identifying a specific record. The translation is applied when the field identified by table_name and field_name contains the exact same value defined in field_value. If only a subset of the value matches field_value, the translation is not applied. If two translation rules match the same record (one with field_value and one with record_id), the rule with record_id takes precedence.'
          conditions:
            - 'Forbidden if table_name is feed_info.'
            - 'Forbidden if record_id is defined.'
            - 'Required if record_id is empty.'

    - file: 'feed_info.txt'
      presence: 'Conditionally Required'
      primary_key: 'none'
      description: 'Contains information about the dataset itself.'
      notes:
        - 'The file contains information about the dataset itself rather than the services described, and the publisher may be a different entity than any of the agencies.'
        - 'Example (multilingual default): A dataset from a multilingual country may have feed_lang=mul and translations provided for each language in translations.txt; the original stop_name values remain in their local language variants.'
        - 'Example (Switzerland): Original stops.stop_name values could be Genève, Zürich, and Biel/Bienne. The dataset feed_lang should be mul and translations provided in German (Genf, Zürich, Biel), French (Genève, Zurich, Bienne), Italian (Ginevra, Zurigo, Bienna), and English (Geneva, Zurich, Biel/Bienne).'
      fields:
        - name: 'feed_publisher_name'
          type: 'Text'
          presence: 'Required'
          description: 'Full name of the organization that publishes the dataset.'
        - name: 'feed_publisher_url'
          type: 'URL'
          presence: 'Required'
          description: 'URL of the dataset publishing organization''s website.'
        - name: 'feed_lang'
          type: 'Language code'
          presence: 'Required'
          description: 'Default language used for the text in this dataset. The translations.txt file can be used if the text needs to be translated into languages other than the default one. The default language may be multilingual for datasets with the original text in multiple languages; in such cases, feed_lang should contain mul and translations should be provided for each language used in the dataset. If all original text is in the same language, then mul should not be used.'
        - name: 'default_lang'
          type: 'Language code'
          presence: 'Optional'
          description: 'Defines the language that should be used when the data consumer does not know the language of the rider.'
        - name: 'feed_start_date'
          type: 'Date'
          presence: 'Recommended'
          description: 'The dataset provides complete and reliable schedule information for service in the period from the beginning of the feed_start_date day to the end of the feed_end_date day. Both days may be left empty if unavailable. The feed_end_date date must not precede the feed_start_date date if both are given. It is recommended that dataset providers give schedule data outside this period to advise of likely future service, but dataset consumers should treat it mindful of its non-authoritative status. If feed_start_date or feed_end_date extend beyond the active calendar dates defined in calendar.txt and calendar_dates.txt, the dataset asserts there is no service for dates within the feed range but not included in the active calendar dates.'
        - name: 'feed_end_date'
          type: 'Date'
          presence: 'Recommended'
          description: 'End date for the feed period described by feed_start_date.'
        - name: 'feed_version'
          type: 'Text'
          presence: 'Recommended'
          description: 'String that indicates the current version of the GTFS dataset.'
        - name: 'feed_contact_email'
          type: 'Email'
          presence: 'Optional'
          description: 'Email address for communication regarding the GTFS dataset and data publishing practices. feed_contact_email is a technical contact for GTFS-consuming applications. Provide customer service contact information through agency.txt. It is recommended that at least one of feed_contact_email or feed_contact_url are provided.'
        - name: 'feed_contact_url'
          type: 'URL'
          presence: 'Optional'
          description: 'URL for contact information regarding the GTFS dataset and data publishing practices. feed_contact_url is a technical contact for GTFS-consuming applications. Provide customer service contact information through agency.txt. It is recommended that at least one of feed_contact_url or feed_contact_email are provided.'

    - file: 'attributions.txt'
      presence: 'Optional'
      primary_key: 'attribution_id'
      description: 'Defines the attributions applied to the dataset.'
      fields:
        - name: 'attribution_id'
          type: 'Unique ID'
          presence: 'Optional'
          description: 'Identifies an attribution for the dataset or a subset of it.'
        - name: 'agency_id'
          type: 'Foreign ID referencing agency.agency_id'
          presence: 'Optional'
          description: 'Agency to which the attribution applies. If one agency_id, route_id, or trip_id attribution is defined, the other ones must be empty. If none is specified, the attribution applies to the whole dataset.'
        - name: 'route_id'
          type: 'Foreign ID referencing routes.route_id'
          presence: 'Optional'
          description: 'Functions in the same way as agency_id except the attribution applies to a route.'
        - name: 'trip_id'
          type: 'Foreign ID referencing trips.trip_id'
          presence: 'Optional'
          description: 'Functions in the same way as agency_id except the attribution applies to a trip.'
        - name: 'organization_name'
          type: 'Text'
          presence: 'Required'
          description: 'Name of the organization that the dataset is attributed to.'
        - name: 'is_producer'
          type: 'Enum'
          presence: 'Optional'
          description: 'The role of the organization is producer. At least one of is_producer, is_operator, or is_authority should be set to 1.'
          options:
            - value: '0 or empty'
              description: 'Organization does not have this role.'
            - value: '1'
              description: 'Organization does have this role.'
        - name: 'is_operator'
          type: 'Enum'
          presence: 'Optional'
          description: 'Functions in the same way as is_producer except the role of the organization is operator.'
          options:
            - value: '0 or empty'
              description: 'Organization does not have this role.'
            - value: '1'
              description: 'Organization does have this role.'
        - name: 'is_authority'
          type: 'Enum'
          presence: 'Optional'
          description: 'Functions in the same way as is_producer except the role of the organization is authority.'
          options:
            - value: '0 or empty'
              description: 'Organization does not have this role.'
            - value: '1'
              description: 'Organization does have this role.'
        - name: 'attribution_url'
          type: 'URL'
          presence: 'Optional'
          description: 'URL of the organization.'
        - name: 'attribution_email'
          type: 'Email'
          presence: 'Optional'
          description: 'Email of the organization.'
        - name: 'attribution_phone'
          type: 'Phone number'
          presence: 'Optional'
          description: 'Phone number of the organization.'

